<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>黃河萬里圖</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100vh;width:100vw;background:#000}
body{font-family:'Noto Serif TC','Noto Serif SC','PingFang TC','微軟正黑體',serif;cursor:default;user-select:none}

/* ═══ LETTERBOX ═══ */
.lbox{position:fixed;left:0;right:0;height:10vh;background:#000;z-index:100;pointer-events:none}
.lbox-t{top:0}.lbox-b{bottom:0}

/* ═══ SCROLL STRIP ═══ */
#viewport{position:fixed;top:10vh;left:0;right:0;bottom:10vh;overflow:hidden;
  perspective:1800px;perspective-origin:50% 50%}
#strip{position:absolute;top:0;left:0;height:100%;display:flex;will-change:transform;
  transform-style:preserve-3d;
  filter:sepia(.08) saturate(.92) contrast(1.04) brightness(.98);
  transition:filter 2.2s cubic-bezier(.4,0,.2,1)}
#strip img{height:100%;width:2800px;object-fit:cover;flex-shrink:0;display:block;pointer-events:none}
.seam{position:absolute;top:0;height:100%;width:220px;z-index:1;pointer-events:none}

/* ═══ VIGNETTE ═══ */
#vig{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:10;pointer-events:none;
  background:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 40%,rgba(0,0,0,.55) 100%)}

/* ═══ PAPER NOISE ═══ */
#noise{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:11;pointer-events:none;
  opacity:.06;mix-blend-mode:multiply}

/* ═══ FX CANVAS ═══ */
#fx{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:12;pointer-events:none}

/* ═══ FOCUS MASK ═══ */
#focus{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:9;pointer-events:none;
  opacity:0;transition:opacity .25s ease;
  backdrop-filter:blur(2.5px) brightness(.82);-webkit-backdrop-filter:blur(2.5px) brightness(.82);
  mask-image:radial-gradient(circle 350px at 50% 50%,transparent 55%,black 100%);
  -webkit-mask-image:radial-gradient(circle 350px at 50% 50%,transparent 55%,black 100%)}

/* ═══ TRANSITION BLACK ═══ */
#curtain{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:80;pointer-events:none;
  background:#000;opacity:0;transition:opacity .15s ease}
#curtain.on{opacity:1}
#curtain.slow{transition:opacity .55s ease}

/* ═══ INTRO ═══ */
#intro{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer}
#intro-title{font-family:'Ma Shan Zheng',cursive;font-size:96px;color:#d4c5a0;
  letter-spacing:.3em;opacity:0;transition:opacity 2.5s cubic-bezier(.4,0,.2,1)}
#intro-sub{font-size:14px;color:rgba(212,197,160,.7);letter-spacing:.5em;margin-top:60px;
  height:1.4em;overflow:hidden}
#intro-sub span{opacity:0;transition:opacity .3s ease}
#intro-hint{position:absolute;bottom:15vh;font-size:12px;color:rgba(212,197,160,.35);
  letter-spacing:.3em}
#intro.phase2 #intro-title{opacity:1}
#intro.fadeout{transition:opacity 2s cubic-bezier(.4,0,.2,1);opacity:0;pointer-events:none}

/* ═══ TOP BRAND ═══ */
#brand{position:fixed;top:0;left:0;height:10vh;display:flex;align-items:center;padding-left:24px;
  z-index:101;pointer-events:none}
#brand span{font-size:13px;color:rgba(212,197,160,.5);letter-spacing:.15em;
  font-family:'Ma Shan Zheng',cursive}

/* ═══ PROGRESS (inside bottom letterbox) ═══ */
#prog-wrap{position:fixed;bottom:0;left:0;right:0;height:10vh;z-index:101;
  display:flex;align-items:flex-start;justify-content:center;padding-top:12px}
#prog-line{position:relative;width:70%;height:1px;background:rgba(212,197,160,.2)}
.prog-dot{position:absolute;top:50%;width:6px;height:6px;border-radius:50%;
  background:rgba(212,197,160,.35);transform:translate(-50%,-50%);cursor:pointer;
  transition:all .3s ease}
.prog-dot:hover{background:rgba(212,197,160,.7);transform:translate(-50%,-50%) scale(1.4)}
.prog-tip{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  writing-mode:vertical-rl;font-size:10px;color:rgba(212,197,160,.6);letter-spacing:.1em;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.prog-dot:hover .prog-tip{opacity:1}
#prog-cur{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;
  background:#d4c5a0;transform:translate(-50%,-50%);transition:left .3s ease;pointer-events:none}
</style>
<style>
/* ═══ CONTROLS (bottom-right, inside letterbox) ═══ */
#ctrls{position:fixed;bottom:0;right:20px;height:10vh;z-index:101;
  display:flex;flex-direction:row;align-items:center;gap:10px}
.ctrl{width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,197,160,.2);
  background:transparent;color:rgba(212,197,160,.5);cursor:pointer;
  font-size:13px;display:flex;align-items:center;justify-content:center;
  transition:all .3s ease;font-family:'Noto Serif TC',serif}
.ctrl:hover{color:rgba(212,197,160,1);border-color:rgba(212,197,160,.4)}

/* ═══ POEM PANEL ═══ */
#poem-panel{position:fixed;top:10vh;right:0;bottom:10vh;width:360px;z-index:90;
  background:rgba(20,16,12,.65);backdrop-filter:blur(24px) saturate(1.2);
  -webkit-backdrop-filter:blur(24px) saturate(1.2);
  transform:translateX(100%);transition:transform .6s cubic-bezier(.4,0,.2,1);
  padding:50px;display:flex;flex-direction:column;overflow:hidden}
#poem-panel.open{transform:translateX(0)}
#poem-panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;
  background:rgba(212,197,160,.15);box-shadow:0 0 8px rgba(212,197,160,.08)}
.pp-chapter{font-family:'Ma Shan Zheng','Noto Serif TC',cursive;font-size:36px;color:#d4c5a0;
  letter-spacing:.2em;margin-bottom:16px}
.pp-line{width:30px;height:1px;background:rgba(212,197,160,.3);margin-bottom:28px}
.pp-poem-wrap{flex:1;display:flex;flex-direction:row-reverse;justify-content:flex-start;
  align-items:flex-start;gap:22px;overflow:hidden;padding-top:10px}
.pp-poem-col{writing-mode:vertical-rl;-webkit-writing-mode:vertical-rl;
  font-family:'Noto Serif TC','Noto Serif SC',serif;font-feature-settings:"palt";
  font-size:22px;line-height:1.9;color:rgba(212,197,160,.85);letter-spacing:.15em;
  white-space:nowrap;height:auto;max-height:100%}
.pp-poem-col span{opacity:0;transition:opacity .35s ease}
.pp-author{writing-mode:horizontal-tb;font-size:16px;color:rgba(212,197,160,.45);
  margin-top:20px;letter-spacing:.15em;text-align:right}
.pp-play{writing-mode:horizontal-tb;margin-top:16px;align-self:flex-end;
  width:28px;height:28px;border-radius:50%;border:1px solid rgba(212,197,160,.25);
  background:transparent;color:rgba(212,197,160,.5);cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;transition:all .3s}
.pp-play:hover{color:rgba(212,197,160,1);border-color:rgba(212,197,160,.5)}

/* ═══ BIRD ═══ */
.bird-svg{position:fixed;z-index:13;pointer-events:none}
.bird-wing{animation:flap .7s ease-in-out infinite alternate}
@keyframes flap{0%{transform:scaleY(1)}100%{transform:scaleY(.55)}}

/* ═══ SPOTLIGHT ═══ */
#spot{position:fixed;top:10vh;left:0;right:0;bottom:10vh;z-index:13;
  pointer-events:none;mix-blend-mode:screen;opacity:0;transition:opacity .6s ease}

/* ═══ CHAPTER INDICATOR ═══ */
#ch-indicator{position:fixed;bottom:10vh;left:0;right:0;height:0;z-index:102;
  pointer-events:none;text-align:center}
#ch-name{display:inline-block;position:relative;top:-44px;
  font-family:'Ma Shan Zheng','Noto Serif TC',cursive;font-size:22px;
  color:rgba(212,197,160,.9);letter-spacing:.35em;padding-right:.35em;
  text-shadow:0 2px 14px rgba(0,0,0,.7);transition:opacity .7s ease}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-title">黃河萬里圖</div>
  <div id="intro-sub"></div>
  <div id="intro-hint">點擊進入</div>
</div>

<!-- LETTERBOX -->
<div class="lbox lbox-t"></div>
<div class="lbox lbox-b"></div>

<!-- VIEWPORT -->
<div id="viewport">
  <div id="strip">
    <img src="section1-qinghai.png" alt="青海">
    <img src="section2-gansu.png" alt="甘肅">
    <img src="section3-shaanxi.png" alt="陝西">
    <img src="section4-henan.png" alt="河南">
    <img src="section5-shandong.png" alt="山東">
  </div>
</div>

<!-- OVERLAYS -->
<div id="vig"></div>
<svg id="noise" width="100%" height="100%"><filter id="nf">
  <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#nf)"/></svg>
<canvas id="fx"></canvas>
<div id="spot"></div>
<div id="focus"></div>
<div id="curtain"></div>

<!-- UI -->
<div id="brand"><span>黃河萬里圖</span></div>
<div id="ch-indicator"><span id="ch-name">源頭·青海</span></div>
<div id="prog-wrap"><div id="prog-line"><div id="prog-cur"></div></div></div>
<div id="ctrls">
  <button class="ctrl" id="btn-tour" title="自動漫遊">⏸</button>
  <button class="ctrl" id="btn-audio" title="音頻">♪</button>
  <button class="ctrl" id="btn-season" title="季節">春</button>
  <button class="ctrl" id="btn-poem" title="詩詞">詩</button>
</div>

<!-- POEM PANEL -->
<div id="poem-panel">
  <div class="pp-chapter"></div>
  <div class="pp-line"></div>
  <div class="pp-poem-wrap"></div>
  <div class="pp-author"></div>
  <button class="pp-play">▶</button>
</div>

<script>
/* ═══ CONSTANTS ═══ */
const SW=2800,N=5,TW=SW*N;
const CH=[
  {name:'源頭·青海',focus:1400,poem:'白日依山盡，\n黃河入海流。\n欲窮千里目，\n更上一層樓。',
   pt:'登鸛雀樓',au:'王之渙'},
  {name:'峽谷·甘肅',focus:SW+1400,poem:'黃河遠上白雲間，\n一片孤城萬仞山。\n羌笛何須怨楊柳，\n春風不度玉門關。',
   pt:'涼州詞',au:'王之渙'},
  {name:'壺口·陝西',focus:SW*2+1400,poem:'君不見黃河之水天上來，\n奔流到海不復回。\n君不見高堂明鏡悲白髮，\n朝如青絲暮成雪。',
   pt:'將進酒（節選）',au:'李白'},
  {name:'中原·河南',focus:SW*3+1400,poem:'風急天高猿嘯哀，\n渚清沙白鳥飛回。\n無邊落木蕭蕭下，\n不盡長江滾滾來。',
   pt:'登高',au:'杜甫'},
  {name:'入海·山東',focus:SW*4+1400,poem:'九曲黃河萬里沙，\n浪淘風簸自天涯。\n如今直上銀河去，\n同到牽牛織女家。',
   pt:'浪淘沙·其一',au:'劉禹錫'}
];
const SEASONS=['春','夏','秋','冬'];
const SFILTER={
  春:'sepia(.08) saturate(.97) contrast(1.04) brightness(.98) hue-rotate(-6deg) saturate(1.05) brightness(1.03)',
  夏:'sepia(.08) saturate(1.04) contrast(1.09) brightness(.98)',
  秋:'sepia(.26) saturate(1.0) contrast(1.04) brightness(.94)',
  冬:'sepia(.08) saturate(.57) contrast(.99) brightness(1.04) hue-rotate(6deg)'
};

/* ═══ STATE ═══ */
const S={x:0,tx:0,drag:false,dsx:0,dcx:0,vel:0,lpx:0,lpt:0,
  auto:true,userIdle:0,scale:1,tScale:1,
  season:0,audioOn:false,poemOpen:false,curCh:0,
  focusX:-1,focusY:-1,idle:0,focusOn:false,
  introOver:false,started:false,
  pauseT:0,paused:false,pauseCh:-1,
  tiltX:0,tiltY:0,tTiltX:0,tTiltY:0};
let W,H,dpr,VH;
const strip=document.getElementById('strip');
const fxC=document.getElementById('fx');
const fxX=fxC.getContext('2d');
const focusEl=document.getElementById('focus');
const curtain=document.getElementById('curtain');
/* ═══ RESIZE ═══ */
function resize(){
  dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;
  VH=H*.8;
  fxC.width=W*dpr;fxC.height=VH*dpr;
  fxC.style.width=W+'px';fxC.style.height=VH+'px';
  fxX.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize',resize);resize();

/* ═══ SEAMS ═══ */
function buildSeams(){
  strip.querySelectorAll('.seam').forEach(s=>s.remove());
  for(let i=1;i<N;i++){
    const d=document.createElement('div');d.className='seam';
    d.style.left=(i*SW-110)+'px';
    d.style.background='linear-gradient(to right,transparent,#e8dcc4 40%,#e8dcc4 60%,transparent)';
    d.style.opacity='.45';
    strip.appendChild(d);
  }
}
buildSeams();

/* ═══ PROGRESS DOTS ═══ */
const progLine=document.getElementById('prog-line');
const progCur=document.getElementById('prog-cur');
function buildDots(){
  CH.forEach((c,i)=>{
    const d=document.createElement('div');d.className='prog-dot';
    d.style.left=((c.focus/TW)*100)+'%';
    const tip=document.createElement('div');tip.className='prog-tip';
    tip.textContent=c.name;d.appendChild(tip);
    d.addEventListener('click',()=>jumpTo(i));
    progLine.appendChild(d);
  });
}
buildDots();

/* ═══ SCROLL ENGINE ═══ */
function clamp(v){return Math.max(0,Math.min(TW-W,v))}
function applyStrip(){strip.style.transform=`translateX(${-S.x}px) scale(${S.scale}) rotateX(${S.tiltX}deg) rotateY(${S.tiltY}deg)`}
function updateProg(){progCur.style.left=((S.x/(TW-W))*100)+'%'}

/* wheel */
document.getElementById('viewport').addEventListener('wheel',e=>{
  e.preventDefault();
  userTakeover();
  S.tx=clamp(S.tx+(e.deltaY||e.deltaX)*1.8);
},{passive:false});

/* drag / pointer */
const vp=document.getElementById('viewport');
vp.addEventListener('pointerdown',e=>{
  if(e.button!==0)return;
  S.drag=true;S.dsx=S.x;S.dcx=e.clientX;S.lpx=e.clientX;S.lpt=performance.now();
  S.vel=0;userTakeover();vp.setPointerCapture(e.pointerId);
});
vp.addEventListener('pointermove',e=>{
  if(!S.drag)return;
  const dx=e.clientX-S.dcx;
  S.tx=clamp(S.dsx-dx);
  const now=performance.now(),dt=now-S.lpt;
  if(dt>0){S.vel=(S.lpx-e.clientX)/dt*16;S.lpx=e.clientX;S.lpt=now}
});
vp.addEventListener('pointerup',e=>{
  if(!S.drag)return;S.drag=false;
  S.tx=clamp(S.tx+S.vel*8);
  vp.releasePointerCapture(e.pointerId);
});

/* touch */
let _ts=0;
vp.addEventListener('touchstart',e=>{_ts=e.touches[0].clientX;userTakeover()},{passive:true});
vp.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-_ts;_ts=e.touches[0].clientX;
  S.tx=clamp(S.tx-dx*1.5);
},{passive:true});

/* ═══ JUMP TO CHAPTER ═══ */
function jumpTo(i){
  curtain.classList.add('on');
  setTimeout(()=>{
    S.tx=clamp(CH[i].focus-W/2);S.x=S.tx;applyStrip();
    curtain.classList.add('slow');curtain.classList.remove('on');
    setTimeout(()=>curtain.classList.remove('slow'),600);
    openPoem(i);
  },180);
}

/* ═══ USER TAKEOVER / HANDBACK ═══ */
function userTakeover(){
  if(S.auto){S.auto=false;document.getElementById('btn-tour').textContent='▶'}
  S.userIdle=0;
}
/* ═══ AUTO TOUR ═══ */
const TOUR_SPD=22,ZOOM_LO=1.0,ZOOM_HI=1.035,ZOOM_T=35,FOCUS_ZOOM=1.06,FOCUS_DUR=5;
let tourT=0,focusTimer=0,focusingCh=-1;

function tourTick(dt){
  if(!S.auto||!S.introOver)return;
  tourT+=dt;
  // Ken Burns micro-zoom
  S.tScale=ZOOM_LO+(ZOOM_HI-ZOOM_LO)*(.5+.5*Math.sin(tourT*2*Math.PI/ZOOM_T));

  // chapter focus pause
  if(S.paused){
    focusTimer-=dt;
    if(focusTimer<=0){S.paused=false;S.pauseCh=focusingCh;focusingCh=-1;S.tScale=ZOOM_LO}
    return;
  }
  S.tx=clamp(S.tx+TOUR_SPD*dt);
  // check chapter proximity
  for(let i=0;i<N;i++){
    if(i===S.pauseCh)continue;
    const cx=CH[i].focus-W/2;
    if(Math.abs(S.tx-cx)<30){
      S.paused=true;focusTimer=FOCUS_DUR;focusingCh=i;
      S.tScale=FOCUS_ZOOM;S.tx=cx;
      openPoem(i);break;
    }
  }
  // loop back
  if(S.tx>=TW-W-10){S.tx=0;S.x=0;S.pauseCh=-1;tourT=0}
}

document.getElementById('btn-tour').addEventListener('click',()=>{
  S.auto=!S.auto;
  document.getElementById('btn-tour').textContent=S.auto?'⏸':'▶';
  if(S.auto){S.pauseCh=-1;S.paused=false}
});

/* ═══ INTRO SEQUENCE (12s) ═══ */
const intro=document.getElementById('intro');
const introTitle=document.getElementById('intro-title');
const introSub=document.getElementById('intro-sub');
const SUB_TEXT='從青海源頭到山東入海 · 五千年文明的數字長卷';

function startIntro(){
  setTimeout(()=>intro.classList.add('phase2'),800);
  // typewriter subtitle at 4s
  setTimeout(()=>{
    let ci=0;
    const iv=setInterval(()=>{
      if(ci>=SUB_TEXT.length){clearInterval(iv);return}
      const sp=document.createElement('span');
      sp.textContent=SUB_TEXT[ci];introSub.appendChild(sp);
      requestAnimationFrame(()=>sp.style.opacity='1');
      ci++;
    },80);
  },4000);
  // crossfade at 10s
  setTimeout(()=>{
    intro.classList.add('fadeout');
    S.introOver=true;S.started=true;
    setTimeout(()=>intro.remove(),2500);
  },10000);
}
startIntro();

/* ═══ PARTICLES: DUST MOTES (15) ═══ */
const DUST_N=15;
let dusts=[];
function initDust(){
  dusts=[];
  for(let i=0;i<DUST_N;i++){
    dusts.push({
      x:Math.random()*W,y:Math.random()*VH,
      vx:.08+Math.random()*.12,vy:-.02+Math.random()*.04,
      r:.4+Math.random()*.8,a:.06+Math.random()*.12,
      phase:Math.random()*Math.PI*2
    });
  }
}
function tickDust(dt,t){
  for(const d of dusts){
    d.x+=d.vx*60*dt+Math.sin(t*.3+d.phase)*.15;
    d.y+=d.vy*60*dt+Math.cos(t*.2+d.phase)*.1;
    if(d.x>W+5)d.x=-5;if(d.x<-5)d.x=W+5;
    if(d.y<-5)d.y=VH+5;if(d.y>VH+5)d.y=-5;
  }
}
function drawDust(){
  for(const d of dusts){
    fxX.beginPath();fxX.arc(d.x,d.y,d.r,0,Math.PI*2);
    fxX.fillStyle=`rgba(212,197,160,${d.a})`;fxX.fill();
  }
}
/* ═══ FOG WISPS (4) ═══ */
const FOG_N=4;
let fogs=[];
function initFog(){
  fogs=[];
  for(let i=0;i<FOG_N;i++){
    fogs.push({
      x:Math.random()*W,y:VH*.3+Math.random()*VH*.4,
      w:180+Math.random()*220,h:30+Math.random()*40,
      vx:.12+Math.random()*.08,a:.04+Math.random()*.04,
      phase:Math.random()*Math.PI*2
    });
  }
}
function tickFog(dt,t){
  for(const f of fogs){
    f.x+=f.vx*60*dt;
    if(f.x>W+f.w)f.x=-f.w;
  }
}
function drawFog(t){
  for(const f of fogs){
    const ya=f.y+Math.sin(t*.15+f.phase)*8;
    const g=fxX.createRadialGradient(f.x,ya,0,f.x,ya,f.w/2);
    g.addColorStop(0,`rgba(232,220,196,${f.a})`);
    g.addColorStop(1,'rgba(232,220,196,0)');
    fxX.fillStyle=g;
    fxX.fillRect(f.x-f.w/2,ya-f.h/2,f.w,f.h);
  }
}

/* ═══ BIRD (max 1) ═══ */
let bird=null,birdTimer=0;
function spawnBird(){
  bird={x:-30,y:VH*.15+Math.random()*VH*.2,vx:.6+Math.random()*.3,phase:Math.random()*Math.PI*2,size:8+Math.random()*4};
}
function tickBird(dt,t){
  birdTimer-=dt;
  if(!bird&&birdTimer<=0){spawnBird();birdTimer=25+Math.random()*35}
  if(!bird)return;
  bird.x+=bird.vx*60*dt;
  bird.y+=Math.sin(t*1.2+bird.phase)*.3;
  if(bird.x>W+50)bird=null;
}
function drawBird(t){
  if(!bird)return;
  const b=bird,s=b.size;
  const flap=Math.sin(t*5+b.phase)*.4;
  fxX.save();fxX.translate(b.x,b.y);fxX.globalAlpha=.35;
  fxX.strokeStyle='rgba(60,50,40,.5)';fxX.lineWidth=1;fxX.lineCap='round';
  fxX.beginPath();fxX.moveTo(-s,flap*s*.5);fxX.quadraticCurveTo(-s*.3,-s*.3+flap*s*.3,0,0);
  fxX.stroke();
  fxX.beginPath();fxX.moveTo(s,flap*s*.5);fxX.quadraticCurveTo(s*.3,-s*.3+flap*s*.3,0,0);
  fxX.stroke();
  fxX.restore();
}

/* ═══ DEPTH-OF-FIELD + TILT + SPOTLIGHT (mouse) ═══ */
const spotEl=document.getElementById('spot');
vp.addEventListener('mousemove',e=>{
  S.focusX=e.clientX;S.focusY=e.clientY-H*.1;
  S.idle=0;S.focusOn=true;
  // tilt
  const nx=(e.clientX/W-.5);
  const ny=((e.clientY-H*.1)/(H*.8)-.5);
  S.tTiltX=-ny*1.4;
  S.tTiltY=nx*2.2;
  // spotlight
  spotEl.style.opacity='1';
  spotEl.style.background=
    `radial-gradient(circle 320px at ${e.clientX}px ${e.clientY-H*.1}px,rgba(255,235,200,.10) 0%,rgba(255,235,200,.04) 40%,transparent 70%)`;
});
vp.addEventListener('mouseleave',()=>{
  S.focusOn=false;
  S.tTiltX=0;S.tTiltY=0;
  spotEl.style.opacity='0';
});
function tickFocus(dt){
  if(S.focusOn&&S.idle<.5){
    focusEl.style.opacity='1';
    focusEl.style.maskImage=`radial-gradient(circle 350px at ${S.focusX}px ${S.focusY}px,transparent 55%,black 100%)`;
    focusEl.style.webkitMaskImage=focusEl.style.maskImage;
  }else{
    focusEl.style.opacity='0';
  }
  S.idle+=dt;
}

/* ═══ POEM PANEL ═══ */
const poemPanel=document.getElementById('poem-panel');
const ppChapter=poemPanel.querySelector('.pp-chapter');
const ppWrap=poemPanel.querySelector('.pp-poem-wrap');
const ppAuthor=poemPanel.querySelector('.pp-author');
const ppPlay=poemPanel.querySelector('.pp-play');

function renderPoem(i){
  const c=CH[i];
  ppChapter.textContent=c.name;
  ppAuthor.textContent='— '+c.au+'《'+c.pt+'》';
  ppWrap.innerHTML='';
  const lines=c.poem.split('\n');
  lines.forEach((line,li)=>{
    const col=document.createElement('div');col.className='pp-poem-col';
    [...line].forEach((ch,ci)=>{
      const sp=document.createElement('span');sp.textContent=ch;
      sp.style.opacity='0';sp.style.transition='opacity .35s ease';
      col.appendChild(sp);
      setTimeout(()=>sp.style.opacity='1',200+li*100+ci*70);
    });
    ppWrap.appendChild(col);
  });
}

function openPoem(i){
  S.curCh=i;
  renderPoem(i);
  if(!S.poemOpen){S.poemOpen=true;poemPanel.classList.add('open')}
}
function closePoem(){S.poemOpen=false;poemPanel.classList.remove('open')}

document.getElementById('btn-poem').addEventListener('click',()=>{
  if(S.poemOpen)closePoem();else openPoem(S.curCh);
});

/* speech */
ppPlay.addEventListener('click',()=>{
  const c=CH[S.curCh];
  const u=new SpeechSynthesisUtterance(c.poem.replace(/\n/g,''));
  u.lang='zh-TW';u.rate=.7;u.pitch=.9;
  speechSynthesis.cancel();speechSynthesis.speak(u);
});
/* ═══ SEASON ═══ */
document.getElementById('btn-season').addEventListener('click',()=>{
  S.season=(S.season+1)%4;
  document.getElementById('btn-season').textContent=SEASONS[S.season];
  strip.style.filter=SFILTER[SEASONS[S.season]];
});

/* ═══ WEB AUDIO: 65Hz DRONE + WIND ═══ */
let audioCtx,droneGain,windGain;
function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // drone
  const osc=audioCtx.createOscillator();
  osc.type='sine';osc.frequency.value=65;
  droneGain=audioCtx.createGain();droneGain.gain.value=.06;
  osc.connect(droneGain).connect(audioCtx.destination);osc.start();
  // wind (white noise → lowpass)
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*4,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
  windGain=audioCtx.createGain();windGain.gain.value=.03;
  src.connect(lp).connect(windGain).connect(audioCtx.destination);src.start();
  audioCtx.suspend();
}
document.getElementById('btn-audio').addEventListener('click',()=>{
  if(!audioCtx)initAudio();
  S.audioOn=!S.audioOn;
  if(S.audioOn)audioCtx.resume();else audioCtx.suspend();
  document.getElementById('btn-audio').textContent=S.audioOn?'♫':'♪';
});

/* ═══ CHAPTER DETECTION ═══ */
function detectChapter(){
  const cx=S.x+W/2;
  let best=0,bestD=Infinity;
  for(let i=0;i<N;i++){
    const d=Math.abs(CH[i].focus-cx);
    if(d<bestD){bestD=d;best=i}
  }
  if(best!==S.curCh){
    S.curCh=best;
    const el=document.getElementById('ch-name');
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=CH[best].name;el.style.opacity='.9'},350);
    if(S.poemOpen)renderPoem(best);
  }
}

/* ═══ MAIN LOOP ═══ */
let lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  if(!S.started){lastT=ts;return}
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  const t=ts/1000;

  // smooth scroll
  S.x+=(S.tx-S.x)*.08;
  // smooth zoom
  S.scale+=(S.tScale-S.scale)*.03;
  // smooth tilt
  S.tiltX+=(S.tTiltX-S.tiltX)*.04;
  S.tiltY+=(S.tTiltY-S.tiltY)*.04;

  applyStrip();updateProg();
  tourTick(dt);
  detectChapter();

  // user idle handback
  if(!S.auto){
    S.userIdle+=dt;
    if(S.userIdle>20){S.auto=true;S.pauseCh=-1;document.getElementById('btn-tour').textContent='⏸'}
  }

  // fx canvas
  fxX.clearRect(0,0,W,VH);
  tickDust(dt,t);drawDust();
  tickFog(dt,t);drawFog(t);
  tickBird(dt,t);drawBird(t);
  tickFocus(dt);

  // wind gain modulation
  if(windGain){
    const wv=.02+.015*Math.sin(t*.08);
    windGain.gain.value=wv;
  }
}

/* ═══ INIT ═══ */
initDust();initFog();
requestAnimationFrame(frame);
</script>
