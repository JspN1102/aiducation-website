<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>黃河萬里圖 · 數字長卷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════ */
:root{
  --paper:#f7f1e6;--paper-warm:#f0e8d8;--paper-tan:#e6dbc8;--paper-deep:#d9ccb4;
  --ink-100:#1c1710;--ink-90:#2e2820;--ink-80:#4a4238;--ink-60:#726a5e;--ink-40:#9e9688;--ink-20:#c5bfb4;
  --gold:#b8963e;--gold-light:#d4b35a;--seal:#c23a2e;
  --sky-top:#c8ccd4;--sky-bot:#ddd8cc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100vh;width:100vw}
body{font-family:'Noto Serif SC',serif;background:var(--ink-100);color:var(--ink-100);cursor:grab}
body.dragging{cursor:grabbing}

/* ═══ 3D SCENE CONTAINER ═══ */
#scene{position:fixed;inset:0;perspective:1500px;perspective-origin:50% 50%;overflow:hidden}
#scene-inner{position:absolute;width:100%;height:100%;transform-style:preserve-3d}

/* ═══ PARALLAX LAYERS ═══ */
.p-layer{position:absolute;top:0;left:0;height:100%;transform-style:preserve-3d;will-change:transform;
  transition:filter .8s ease}
.p-layer svg{display:block;height:100%}
.p-layer img{display:block;height:100%;position:absolute;top:0;left:0;object-fit:cover}
#layer1{z-index:1;filter:blur(1.5px)}
#layer2{z-index:2;filter:blur(.6px)}
#layer3{z-index:3}
#layer4{z-index:4}
#layer5{z-index:5}

/* ═══ SKY GRADIENT (behind everything) ═══ */
#sky{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bot) 55%,#d4ccb8 100%);
  transition:background 1s ease}

/* ═══ PAPER TEXTURE OVERLAY ═══ */
#paper-tex{position:fixed;inset:0;z-index:30;pointer-events:none;opacity:.08;mix-blend-mode:multiply}

/* ═══ SCROLL EDGE FADE ═══ */
#edge-fade-l,#edge-fade-r{position:fixed;top:0;bottom:0;width:120px;z-index:25;pointer-events:none}
#edge-fade-l{left:0;background:linear-gradient(90deg,var(--ink-100) 0%,transparent 100%)}
#edge-fade-r{right:0;background:linear-gradient(270deg,var(--ink-100) 0%,transparent 100%)}

/* ═══ SCROLL BORDERS (top/bottom) ═══ */
.scroll-rod{position:fixed;left:0;right:0;height:32px;z-index:28;
  background:linear-gradient(180deg,#e8dcc0,#d4c8a8,#c8b890);pointer-events:none}
.scroll-rod::before{content:'';position:absolute;left:0;right:0;height:4px;
  background:linear-gradient(180deg,rgba(0,0,0,.15),transparent)}
.scroll-rod::after{content:'';position:absolute;left:0;right:0;height:100%;
  background:repeating-linear-gradient(90deg,rgba(160,140,100,.15) 0,rgba(160,140,100,.15) 1px,transparent 1px,transparent 40px)}
.scroll-rod-top{top:0}.scroll-rod-top::before{bottom:0}
.scroll-rod-bot{bottom:0}.scroll-rod-bot::before{top:0}

/* ═══ CANVASES ═══ */
#particle-canvas{position:fixed;inset:0;z-index:20;pointer-events:none}
#ripple-canvas{position:fixed;inset:0;z-index:21;pointer-events:none}
#time-overlay{position:fixed;inset:0;z-index:22;pointer-events:none;transition:background 1s ease}
#fog-overlay{position:fixed;inset:0;z-index:22;pointer-events:none;opacity:0;transition:opacity 1s ease;
  background:radial-gradient(ellipse at 50% 60%,rgba(230,225,210,.5),rgba(200,195,180,.3),transparent 70%)}
#fog-overlay.on{opacity:1}
/* ═══ FLYING BIRDS ═══ */
.bird{position:fixed;z-index:19;pointer-events:none;opacity:.35}
.bird svg{width:30px;height:auto}
@keyframes birdFly{0%{transform:translate(110vw,10vh) scaleX(-1)}100%{transform:translate(-20vw,8vh) scaleX(-1)}}
@keyframes birdFly2{0%{transform:translate(120vw,18vh)}100%{transform:translate(-15vw,14vh)}}
@keyframes birdFly3{0%{transform:translate(105vw,6vh) scaleX(-1)}100%{transform:translate(-25vw,12vh) scaleX(-1)}}
.bird:nth-child(1){animation:birdFly 45s linear infinite}
.bird:nth-child(2){animation:birdFly2 55s linear 8s infinite;opacity:.25}
.bird:nth-child(3){animation:birdFly3 65s linear 20s infinite;opacity:.2}

/* ═══ TITLE ═══ */
#title-bar{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:35;text-align:center;pointer-events:none}
#title-bar h1{font-family:'Ma Shan Zheng',cursive;font-size:38px;color:var(--paper);
  text-shadow:0 2px 12px rgba(0,0,0,.6),0 0 40px rgba(0,0,0,.2);letter-spacing:.2em}
#title-bar .sub{font-family:'ZCOOL XiaoWei',serif;font-size:13px;color:var(--ink-20);letter-spacing:.4em;margin-top:4px}
.seal-stamp{display:inline-block;border:2px solid var(--seal);color:var(--seal);font-size:11px;
  padding:2px 5px;margin-left:12px;font-family:'Ma Shan Zheng',cursive;letter-spacing:.05em;
  transform:rotate(-4deg);opacity:.7;vertical-align:middle}

/* ═══ PROGRESS BAR ═══ */
#progress{position:fixed;top:36px;left:4%;right:4%;height:3px;z-index:35;border-radius:2px;
  background:rgba(255,255,255,.08)}
#progress-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));
  transition:width .15s linear}
#progress-labels{position:fixed;top:42px;left:4%;right:4%;z-index:35;display:flex;pointer-events:none}
.prog-label{flex:1;text-align:center;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.08em;
  transition:color .4s}.prog-label.active{color:var(--gold-light)}

/* ═══ CONTROL PANELS ═══ */
.ctrl-panel{position:fixed;z-index:35;display:flex;flex-direction:column;gap:3px}
.ctrl-group{padding:8px;border-radius:8px;background:rgba(28,23,16,.5);backdrop-filter:blur(10px);
  border:1px solid rgba(184,150,62,.15);display:flex;flex-direction:column;gap:3px}
.ctrl-label{font-size:9px;color:var(--gold);letter-spacing:.2em;text-align:center;margin-bottom:1px;
  font-family:'ZCOOL XiaoWei',serif}
.ctrl-btn{background:rgba(255,255,255,.04);border:1px solid rgba(184,150,62,.2);color:var(--paper-warm);
  padding:5px 8px;border-radius:3px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:11px;
  transition:all .3s;text-align:center}
.ctrl-btn:hover{background:rgba(184,150,62,.15);border-color:rgba(184,150,62,.5)}
.ctrl-btn.on{background:rgba(184,150,62,.2);border-color:var(--gold);color:var(--gold-light);
  box-shadow:inset 0 0 8px rgba(184,150,62,.1)}
#season-panel{right:10px;top:calc(50% - 180px)}
#time-panel{right:10px;top:calc(50% - 30px)}
#weather-panel{right:10px;top:calc(50% + 100px)}

/* ═══ CHAPTER NAV ═══ */
#chapters{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:35;
  display:flex;gap:2px;padding:5px 8px;border-radius:20px;
  background:rgba(28,23,16,.5);backdrop-filter:blur(10px);border:1px solid rgba(184,150,62,.12)}
.ch-btn{background:transparent;border:1px solid rgba(184,150,62,.15);color:rgba(255,255,255,.5);
  padding:5px 12px;border-radius:14px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:11px;
  transition:all .3s;white-space:nowrap}
.ch-btn:hover{background:rgba(184,150,62,.12);color:var(--paper)}
.ch-btn.on{background:rgba(184,150,62,.2);border-color:var(--gold);color:var(--gold-light)}

/* ═══ FLOATING BUTTONS ═══ */
.fab{position:fixed;z-index:35;width:36px;height:36px;border-radius:50%;
  background:rgba(28,23,16,.5);backdrop-filter:blur(10px);border:1px solid rgba(184,150,62,.2);
  color:var(--paper);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all .3s}
.fab:hover{background:rgba(184,150,62,.2);border-color:var(--gold)}
.fab.on{background:rgba(184,150,62,.25);border-color:var(--gold);box-shadow:0 0 12px rgba(184,150,62,.2)}
#btn-tour{left:14px;bottom:14px}
#btn-music{left:58px;bottom:14px}
#btn-focus{left:102px;bottom:14px;font-size:11px}

/* ═══ HOTSPOTS ═══ */
.hotspot{position:absolute;width:28px;height:28px;border-radius:50%;cursor:pointer;z-index:15;
  transform:translate(-50%,-50%)}
.hs-ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid rgba(184,150,62,.5);
  animation:hsPulse 3s ease-in-out infinite}
.hs-dot{position:absolute;inset:8px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,179,90,.9),rgba(184,150,62,.4));
  box-shadow:0 0 10px rgba(184,150,62,.4)}
.hs-label{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:11px;color:var(--gold-light);background:rgba(28,23,16,.75);
  padding:3px 10px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;
  backdrop-filter:blur(6px);border:1px solid rgba(184,150,62,.2)}
.hotspot:hover .hs-label{opacity:1}
@keyframes hsPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.6);opacity:0}}

/* ═══ POPUP ═══ */
#popup-bg{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(15,12,8,.65);backdrop-filter:blur(6px)}
#popup-bg.open{display:flex}
.popup{position:relative;background:var(--paper);color:var(--ink-90);border-radius:4px;
  padding:36px 48px;max-width:440px;width:88%;box-shadow:0 12px 60px rgba(0,0,0,.5);
  animation:popUp .4s cubic-bezier(.16,1,.3,1)}
@keyframes popUp{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:none}}
.popup-bind{position:absolute;top:8%;bottom:8%;width:3px;
  background:repeating-linear-gradient(180deg,var(--gold) 0,var(--gold) 5px,transparent 5px,transparent 9px)}
.popup-bind-l{left:14px}.popup-bind-r{right:14px}
.popup-x{position:absolute;top:8px;right:14px;background:none;border:none;font-size:20px;
  color:var(--ink-40);cursor:pointer;transition:color .2s}.popup-x:hover{color:var(--ink-100)}
.popup-place{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--ink-100)}
.popup-prov{font-size:11px;color:var(--ink-40);letter-spacing:.12em;margin:2px 0 10px}
.popup-hr{height:1px;background:linear-gradient(90deg,transparent,var(--paper-deep),transparent);margin:10px 0}
.popup-pt{font-size:12px;color:var(--ink-60);margin-bottom:4px}
.popup-poem{font-size:15px;line-height:2.2;color:var(--ink-80);letter-spacing:.08em;white-space:pre-line}
.popup-desc{font-size:12.5px;line-height:1.9;color:var(--ink-60)}
.popup-speak{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:5px 14px;
  background:rgba(184,150,62,.1);border:1px solid var(--gold);border-radius:14px;cursor:pointer;
  font-family:'Noto Serif SC',serif;font-size:11px;color:var(--gold);transition:all .3s}
.popup-speak:hover{background:rgba(184,150,62,.22)}

/* ═══ HINT ═══ */
#hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:35;
  font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.2em;
  animation:hintFade 5s ease 3s forwards}
@keyframes hintFade{to{opacity:0}}
</style>
</head>
<body>

<!-- SKY -->
<div id="sky"></div>

<!-- 3D SCENE -->
<div id="scene">
  <div id="scene-inner">
    <div id="layer1" class="p-layer"></div>
    <div id="layer2" class="p-layer"></div>
    <div id="layer3" class="p-layer"></div>
    <div id="layer4" class="p-layer"></div>
    <div id="layer5" class="p-layer"></div>
  </div>
</div>

<!-- OVERLAYS -->
<canvas id="particle-canvas"></canvas>
<canvas id="ripple-canvas"></canvas>
<div id="time-overlay"></div>
<div id="fog-overlay"></div>

<!-- PAPER TEXTURE (generated by SVG feTurbulence) -->
<svg id="paper-tex" width="100%" height="100%">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/>
  <feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>

<!-- SCROLL RODS -->
<div class="scroll-rod scroll-rod-top"></div>
<div class="scroll-rod scroll-rod-bot"></div>

<!-- EDGE FADES -->
<div id="edge-fade-l"></div>
<div id="edge-fade-r"></div>

<!-- BIRDS -->
<div class="bird"><svg viewBox="0 0 40 16"><path d="M0 8Q8 0 16 6Q20 2 24 6Q28 0 40 8Q28 6 24 10Q20 6 16 10Q8 6 0 8Z" fill="rgba(40,35,25,.6)"/></svg></div>
<div class="bird"><svg viewBox="0 0 40 16"><path d="M0 8Q8 0 16 6Q20 2 24 6Q28 0 40 8Q28 6 24 10Q20 6 16 10Q8 6 0 8Z" fill="rgba(40,35,25,.5)"/></svg></div>
<div class="bird"><svg viewBox="0 0 40 16"><path d="M0 8Q8 0 16 6Q20 2 24 6Q28 0 40 8Q28 6 24 10Q20 6 16 10Q8 6 0 8Z" fill="rgba(40,35,25,.4)"/></svg></div>

<!-- UI -->
<div id="title-bar">
  <h1>黃河萬里圖 · 數字長卷<span class="seal-stamp">數字藝術</span></h1>
  <div class="sub">DIGITAL PANORAMIC SCROLL OF THE YELLOW RIVER</div>
</div>

<div id="progress"><div id="progress-fill"></div></div>
<div id="progress-labels"></div>

<div id="season-panel" class="ctrl-panel"><div class="ctrl-group">
  <div class="ctrl-label">四 季</div>
  <button class="ctrl-btn on" data-season="spring">春</button>
  <button class="ctrl-btn" data-season="summer">夏</button>
  <button class="ctrl-btn" data-season="autumn">秋</button>
  <button class="ctrl-btn" data-season="winter">冬</button>
</div></div>

<div id="time-panel" class="ctrl-panel"><div class="ctrl-group">
  <div class="ctrl-label">時 辰</div>
  <button class="ctrl-btn" data-time="dawn">晨</button>
  <button class="ctrl-btn on" data-time="day">晝</button>
  <button class="ctrl-btn" data-time="dusk">夕</button>
  <button class="ctrl-btn" data-time="night">夜</button>
</div></div>

<div id="weather-panel" class="ctrl-panel"><div class="ctrl-group">
  <div class="ctrl-label">天 氣</div>
  <button class="ctrl-btn on" data-weather="clear">晴</button>
  <button class="ctrl-btn" data-weather="rain">雨</button>
  <button class="ctrl-btn" data-weather="snow">雪</button>
  <button class="ctrl-btn" data-weather="fog">霧</button>
</div></div>

<div id="chapters"></div>
<button id="btn-tour" class="fab" title="自動漫遊">▶</button>
<button id="btn-music" class="fab" title="背景音樂">♪</button>
<button id="btn-focus" class="fab" title="景深模式">景深</button>
<div id="hint">← 拖拽或滾輪瀏覽長卷 →</div>

<!-- POPUP -->
<div id="popup-bg">
  <div class="popup">
    <div class="popup-bind popup-bind-l"></div>
    <div class="popup-bind popup-bind-r"></div>
    <button class="popup-x">&times;</button>
    <div class="popup-place"></div>
    <div class="popup-prov"></div>
    <div class="popup-hr"></div>
    <div class="popup-pt"></div>
    <div class="popup-poem"></div>
    <div class="popup-hr"></div>
    <div class="popup-desc"></div>
    <button class="popup-speak">&#9654; 朗讀詩詞</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   黃河萬里圖 · 數字長卷  —  Multi-layer Parallax 3D Scroll
   ═══════════════════════════════════════════════════════════ */

// ── CONSTANTS ──
const LW=12000, LH=900;
const PARALLAX=[.15,.35,.6,.82,1.0];
const Z_DEPTHS=[-600,-300,0,180,350];
const Z_SCALES=[1.4,1.2,1,.88,.77];
const BLUR_BASE=[1.5,.6,0,.4,1.2];

const SECTIONS=[
  {name:'源頭·青海',start:0,end:2000},
  {name:'上游·甘肅',start:2000,end:4000},
  {name:'河套·寧夏',start:4000,end:6000},
  {name:'黃土·陝西',start:6000,end:8000},
  {name:'中原·河南',start:8000,end:10000},
  {name:'入海·山東',start:10000,end:12000}
];

const HOTSPOTS=[
  {x:900,y:.42,layer:3,title:'日月山',province:'青海',
   pt:'涼州詞',author:'王之渙',
   poem:'黃河遠上白雲間，\n一片孤城萬仞山。\n羌笛何須怨楊柳，\n春風不度玉門關。',
   desc:'日月山位於青海湖東側，海拔3520米，是農牧區天然分界線。文成公主入藏時曾在此回望長安。'},
  {x:2800,y:.38,layer:3,title:'炳靈寺石窟',province:'甘肅',
   pt:'使至塞上',author:'王維',
   poem:'單車欲問邊，屬國過居延。\n征蓬出漢塞，歸雁入胡天。\n大漠孤煙直，長河落日圓。\n蕭關逢候騎，都護在燕然。',
   desc:'炳靈寺石窟始建於西秦，黃河穿峽而過，石窟依崖而鑿，保存千年佛教造像。'},
  {x:4800,y:.45,layer:3,title:'沙坡頭',province:'寧夏',
   pt:'渡黃河',author:'宋琬',
   poem:'倒瀉銀河事有無，\n掀天濁浪只須臾。\n人間更有風濤險，\n翻說黃河是畏途。',
   desc:'沙坡頭位於寧夏中衛，騰格里沙漠與黃河在此交匯，是治沙奇蹟的誕生地。'},
  {x:6600,y:.35,layer:3,title:'壺口瀑布',province:'陝西',
   pt:'將進酒（節選）',author:'李白',
   poem:'君不見黃河之水天上來，\n奔流到海不復回。\n君不見高堂明鏡悲白髮，\n朝如青絲暮成雪。',
   desc:'壺口瀑布是黃河上最大的瀑布，河水驟然收束跌入深槽，氣勢磅礴，聲震數里。'},
  {x:8200,y:.4,layer:3,title:'龍門石窟',province:'河南',
   pt:'登鸛雀樓',author:'王之渙',
   poem:'白日依山盡，\n黃河入海流。\n欲窮千里目，\n更上一層樓。',
   desc:'龍門石窟位於洛陽，始鑿於北魏，現存窟龕兩千餘個，盧舍那大佛為巔峰之作。'},
  {x:9200,y:.48,layer:3,title:'開封古城',province:'河南',
   pt:'題臨安邸',author:'林升',
   poem:'山外青山樓外樓，\n西湖歌舞幾時休。\n暖風薰得遊人醉，\n直把杭州作汴州。',
   desc:'開封曾為北宋都城汴京，城下疊壓六座古城，清明上河圖描繪的正是此城繁華。'},
  {x:10600,y:.32,layer:3,title:'泰山',province:'山東',
   pt:'望嶽',author:'杜甫',
   poem:'岱宗夫如何？齊魯青未了。\n造化鍾神秀，陰陽割昏曉。\n蕩胸生曾雲，決眥入歸鳥。\n會當凌絕頂，一覽眾山小。',
   desc:'泰山為五嶽之首，自秦始皇起歷代帝王封禪於此，是中華民族精神的象徵。'},
  {x:11400,y:.52,layer:3,title:'黃河入海口',province:'山東',
   pt:'浪淘沙',author:'劉禹錫',
   poem:'九曲黃河萬里沙，\n浪淘風簸自天涯。\n如今直上銀河去，\n同到牽牛織女家。',
   desc:'黃河入海口位於山東東營，河水攜帶泥沙匯入渤海，每年新造陸地約25平方公里。'}
];

const SEASON_FILTERS={
  spring:'hue-rotate(-5deg) saturate(1.1) brightness(1.03)',
  summer:'saturate(1.35) brightness(1.04) contrast(1.04)',
  autumn:'sepia(.25) saturate(1.15) hue-rotate(-12deg) brightness(.93)',
  winter:'saturate(.3) brightness(.82) hue-rotate(18deg) contrast(1.08)'
};
const SKY_COLORS={
  spring:['#c8ccd4','#ddd8cc','#d4ccb8'],
  summer:['#a0b8d0','#c8d0c0','#d4ccb0'],
  autumn:['#c8b8a0','#d8c8a8','#d0c0a0'],
  winter:['#b0b8c8','#c0c4d0','#c8c8d0']
};
const TIME_BG={
  dawn:'linear-gradient(180deg,rgba(255,170,90,.18),rgba(255,130,50,.12),transparent)',
  day:'none',
  dusk:'linear-gradient(180deg,rgba(190,70,30,.22),rgba(170,50,20,.18),rgba(30,15,50,.12))',
  night:'linear-gradient(180deg,rgba(8,12,35,.55),rgba(12,16,45,.5),rgba(8,12,35,.58))'
};
const SKY_TIME={
  dawn:['#d4a878','#e0c8a0','#d8c0a0'],
  day:null,
  dusk:['#c08060','#d0a070','#b08060'],
  night:['#1a1e30','#252838','#202535']
};

// ── STATE ──
const S={
  camX:0,targetX:0,dragging:false,dragSX:0,dragCamX:0,velX:0,lastPX:0,lastPT:0,
  season:'spring',time:'day',weather:'clear',
  autoTour:false,tourPhase:0,tourT:0,
  musicOn:false,focusMode:false,focusLayer:2,
  popupIdx:-1,camScale:1,targetScale:1
};

let W,H,dpr;
const layers=[];
// ── IMAGE LAYER BUILDER (5 PNG layers replacing SVG) ──
const LAYER_IMGS=[
  'layer1-farmt.png',   // 远山轮廓 1672x941
  'layer2-clouds.png',  // 云海雾气 1254x1254
  'layer3-main.png',    // 主山脉黄河 1254x1254
  'layer4-shore.png',   // 岸边村落 1448x1086
  'layer5-fg.png'       // 树木人物 1254x1254
];
const LAYER_WIDTHS=[1672,1254,1254,1448,1254];
const LAYER_HEIGHTS=[941,1254,1254,1086,1254];

function buildImageLayers(){
  for(let i=0;i<5;i++){
    const container=document.getElementById('layer'+(i+1));
    const imgW=LAYER_WIDTHS[i];
    const imgH=LAYER_HEIGHTS[i];
    // tile images to fill LW (12000px)
    const tilesNeeded=Math.ceil(LW/imgW)+1;
    // use a wide inner div to hold tiled images
    const strip=document.createElement('div');
    strip.style.cssText=`position:absolute;top:0;left:0;width:${tilesNeeded*imgW}px;height:100%;display:flex`;
    for(let t=0;t<tilesNeeded;t++){
      const img=document.createElement('img');
      img.src=LAYER_IMGS[i];
      img.style.cssText=`width:${imgW}px;height:100%;object-fit:cover;flex-shrink:0`;
      // alternate: flip every other tile for seamless feel
      if(t%2===1) img.style.transform='scaleX(-1)';
      img.draggable=false;
      strip.appendChild(img);
    }
    container.appendChild(strip);
  }
}
buildImageLayers();
// ── CANVAS SETUP ──
const pCanvas=document.getElementById('particle-canvas');
const rCanvas=document.getElementById('ripple-canvas');
const pCtx=pCanvas.getContext('2d');
const rCtx=rCanvas.getContext('2d');

function resize(){
  W=innerWidth;H=innerHeight;dpr=devicePixelRatio||1;
  [pCanvas,rCanvas].forEach(c=>{
    c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
    c.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
  });
  S.targetX=clamp(S.targetX);
}

// ── PARALLAX SCROLL ENGINE ──
function maxScroll(){return LW*PARALLAX[4]-W/Z_SCALES[4]}
function clamp(x){return Math.max(-maxScroll(),Math.min(0,x))}

function applyParallax(){
  for(let i=0;i<5;i++){
    const layer=document.getElementById('layer'+(i+1));
    const tx=S.camX*PARALLAX[i];
    const tz=Z_DEPTHS[i];
    const sc=Z_SCALES[i];
    layer.style.transform=`translate3d(${tx}px,0,${tz}px) scale(${sc*S.camScale})`;
  }
}

function updateProgress(){
  const pos=-S.camX*PARALLAX[2];
  const pct=Math.min(100,Math.max(0,pos/(LW-W/Z_SCALES[2])*100));
  document.getElementById('progress-fill').style.width=pct+'%';
  const labels=document.getElementById('progress-labels').children;
  const chaps=document.getElementById('chapters').children;
  for(let i=0;i<SECTIONS.length;i++){
    const s=SECTIONS[i],active=pos>=s.start&&pos<s.end;
    labels[i].classList.toggle('active',active);
    chaps[i].classList.toggle('on',active);
  }
}

// ── INPUT: WHEEL ──
document.addEventListener('wheel',e=>{
  e.preventDefault();
  S.targetX=clamp(S.targetX-e.deltaY*2);
  if(S.autoTour) toggleTour();
},{passive:false});

// ── INPUT: DRAG ──
document.addEventListener('pointerdown',e=>{
  if(e.target.closest('.ctrl-panel,.ch-btn,.fab,#popup-bg,.hotspot')) return;
  S.dragging=true;S.dragSX=e.clientX;S.dragCamX=S.camX;S.velX=0;S.lastPX=e.clientX;S.lastPT=performance.now();
  document.body.classList.add('dragging');
});
document.addEventListener('pointermove',e=>{
  if(!S.dragging) return;
  S.camX=clamp(S.dragCamX+(e.clientX-S.dragSX));
  S.targetX=S.camX;
  const now=performance.now(),dt=now-S.lastPT;
  if(dt>0) S.velX=(e.clientX-S.lastPX)/dt*16;
  S.lastPX=e.clientX;S.lastPT=now;
  if(S.autoTour) toggleTour();
});
document.addEventListener('pointerup',()=>{
  if(!S.dragging) return;
  S.dragging=false;document.body.classList.remove('dragging');
  S.targetX=clamp(S.camX+S.velX*15);
});

// ── CHAPTER NAV + PROGRESS ──
const chapEl=document.getElementById('chapters');
const progLabels=document.getElementById('progress-labels');
SECTIONS.forEach((sec,i)=>{
  const b=document.createElement('button');b.className='ch-btn';b.textContent=sec.name;
  b.addEventListener('click',()=>{S.targetX=-sec.start/PARALLAX[2];if(S.autoTour) toggleTour()});
  chapEl.appendChild(b);
  const l=document.createElement('div');l.className='prog-label';l.textContent=sec.name;
  progLabels.appendChild(l);
});

// ── SEASON / TIME / WEATHER ──
function setBtn(sel,el){document.querySelectorAll(sel).forEach(b=>b.classList.toggle('on',b===el))}

document.querySelectorAll('[data-season]').forEach(b=>b.addEventListener('click',()=>{
  S.season=b.dataset.season;setBtn('[data-season]',b);
  for(let i=0;i<5;i++) document.getElementById('layer'+(i+1)).style.filter=
    `${SEASON_FILTERS[S.season]} blur(${S.focusMode?getFocusBlur(i):BLUR_BASE[i]}px)`;
  const sc=SKY_COLORS[S.season];
  document.getElementById('sky').style.background=`linear-gradient(180deg,${sc[0]},${sc[1]} 55%,${sc[2]})`;
}));

document.querySelectorAll('[data-time]').forEach(b=>b.addEventListener('click',()=>{
  S.time=b.dataset.time;setBtn('[data-time]',b);
  document.getElementById('time-overlay').style.background=TIME_BG[S.time];
  const st=SKY_TIME[S.time];
  if(st) document.getElementById('sky').style.background=`linear-gradient(180deg,${st[0]},${st[1]} 55%,${st[2]})`;
  else{const sc=SKY_COLORS[S.season];
    document.getElementById('sky').style.background=`linear-gradient(180deg,${sc[0]},${sc[1]} 55%,${sc[2]})`}
}));

let weatherSpawning=false;
document.querySelectorAll('[data-weather]').forEach(b=>b.addEventListener('click',()=>{
  S.weather=b.dataset.weather;setBtn('[data-weather]',b);
  document.getElementById('fog-overlay').classList.toggle('on',S.weather==='fog');
  if(S.weather==='rain'||S.weather==='snow'){weatherSpawning=true;particles=[]}
  else weatherSpawning=false;
}));

// ── DEPTH-OF-FIELD (FOCUS MODE) ──
function getFocusBlur(i){
  const dist=Math.abs(i-S.focusLayer);
  return dist*2.5;
}
function applyFocus(){
  for(let i=0;i<5;i++){
    const blur=S.focusMode?getFocusBlur(i):BLUR_BASE[i];
    document.getElementById('layer'+(i+1)).style.filter=`${SEASON_FILTERS[S.season]} blur(${blur}px)`;
  }
}
document.getElementById('btn-focus').addEventListener('click',()=>{
  S.focusMode=!S.focusMode;
  document.getElementById('btn-focus').classList.toggle('on',S.focusMode);
  applyFocus();
});
document.addEventListener('pointermove',e=>{
  if(!S.focusMode) return;
  const yRatio=e.clientY/H;
  if(yRatio<.25) S.focusLayer=0;
  else if(yRatio<.4) S.focusLayer=1;
  else if(yRatio<.6) S.focusLayer=2;
  else if(yRatio<.75) S.focusLayer=3;
  else S.focusLayer=4;
  applyFocus();
});
// ── WEATHER PARTICLES (with Z-depth for 3D feel) ──
let particles=[];
function spawnParticles(){
  if(!weatherSpawning) return;
  const max=S.weather==='rain'?280:130;
  while(particles.length<max){
    const z=Math.random();
    if(S.weather==='rain')
      particles.push({x:Math.random()*W*1.3,y:-Math.random()*H,
        vx:-1.2-z,vy:10+z*8,len:8+z*10,o:.15+z*.35,z,type:'rain'});
    else
      particles.push({x:Math.random()*W,y:-Math.random()*H,
        vx:0,vy:.3+z*1.2,r:1+z*3,phase:Math.random()*6.28,o:.3+z*.4,z,type:'snow'});
  }
}
function tickParticles(){
  pCtx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.type==='rain'){
      p.x+=p.vx;p.y+=p.vy;
      pCtx.strokeStyle=`rgba(190,200,210,${p.o})`;pCtx.lineWidth=.8+p.z*.5;
      pCtx.beginPath();pCtx.moveTo(p.x,p.y);pCtx.lineTo(p.x+p.vx*2,p.y+p.len);pCtx.stroke();
    }else{
      p.x+=Math.sin(p.phase+=.008)*.4;p.y+=p.vy;
      pCtx.fillStyle=`rgba(255,255,255,${p.o})`;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.r,0,6.28);pCtx.fill();
    }
    if(p.y>H+20||p.x<-40){
      if(weatherSpawning){p.y=-20;p.x=Math.random()*W*1.3}
      else particles.splice(i,1);
    }
  }
}

// ── WATER RIPPLES ──
let ripples=[],lastRipT=0;
document.addEventListener('pointermove',e=>{
  if(S.dragging) return;
  const yRatio=e.clientY/H;
  if(yRatio<.55||yRatio>.9) return;
  const now=performance.now();
  if(now-lastRipT<120) return;
  lastRipT=now;
  ripples.push({x:e.clientX,y:e.clientY,r:0,max:35+Math.random()*25,o:.45});
});
function tickRipples(){
  rCtx.clearRect(0,0,W,H);
  rCtx.globalCompositeOperation='lighter';
  for(let i=ripples.length-1;i>=0;i--){
    const rp=ripples[i];
    rp.r+=.7;rp.o=.45*(1-rp.r/rp.max);
    if(rp.o<=0){ripples.splice(i,1);continue}
    for(let j=0;j<3;j++){
      const rr=rp.r-j*7;if(rr<0) continue;
      rCtx.strokeStyle=`rgba(170,195,205,${rp.o*(1-j*.3)})`;
      rCtx.lineWidth=1.2-j*.3;
      rCtx.beginPath();rCtx.arc(rp.x,rp.y,rr,0,6.28);rCtx.stroke();
    }
  }
  rCtx.globalCompositeOperation='source-over';
}

// ── CLOUD RISING (click on mountains) ──
let clouds=[];
document.getElementById('scene').addEventListener('click',e=>{
  if(e.target.closest('.hotspot')) return;
  const yR=e.clientY/H;
  if(yR>.6) return;
  for(let i=0;i<6;i++){
    clouds.push({x:e.clientX+(-25+Math.random()*50),y:e.clientY+Math.random()*10,
      vx:(-1+Math.random()*2)*.25,vy:-.4-Math.random()*.4,
      r:12+Math.random()*22,o:.3,life:0,max:200});
  }
});
function tickClouds(){
  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];c.x+=c.vx;c.y+=c.vy;c.life++;c.r+=.12;
    c.o=.3*(1-c.life/c.max);
    if(c.life>=c.max){clouds.splice(i,1);continue}
    const g=pCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    g.addColorStop(0,`rgba(230,225,215,${c.o})`);g.addColorStop(1,'rgba(230,225,215,0)');
    pCtx.fillStyle=g;pCtx.beginPath();pCtx.arc(c.x,c.y,c.r,0,6.28);pCtx.fill();
  }
}

// ── HOTSPOTS ──
function buildHotspots(){
  HOTSPOTS.forEach((h,i)=>{
    const dot=document.createElement('div');dot.className='hotspot';
    dot.style.left=h.x+'px';dot.style.top=(h.y*LH)+'px';
    dot.innerHTML=`<div class="hs-ring"></div><div class="hs-dot"></div><div class="hs-label">${h.title}</div>`;
    let dx=0,dy=0;
    dot.addEventListener('pointerdown',e=>{dx=e.clientX;dy=e.clientY});
    dot.addEventListener('pointerup',e=>{
      if(Math.abs(e.clientX-dx)+Math.abs(e.clientY-dy)<8) openPopup(i)});
    document.getElementById('layer'+(h.layer+1)).appendChild(dot);
  });
}

const popBg=document.getElementById('popup-bg');
function openPopup(i){
  S.popupIdx=i;const h=HOTSPOTS[i];
  popBg.querySelector('.popup-place').textContent=h.title;
  popBg.querySelector('.popup-prov').textContent=h.province;
  popBg.querySelector('.popup-pt').textContent=`${h.pt} · ${h.author}`;
  popBg.querySelector('.popup-poem').textContent=h.poem;
  popBg.querySelector('.popup-desc').textContent=h.desc;
  popBg.classList.add('open');
}
function closePopup(){S.popupIdx=-1;popBg.classList.remove('open');speechSynthesis.cancel()}
popBg.querySelector('.popup-x').addEventListener('click',closePopup);
popBg.addEventListener('click',e=>{if(e.target===popBg) closePopup()});
popBg.querySelector('.popup-speak').addEventListener('click',()=>{
  if(S.popupIdx<0) return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(HOTSPOTS[S.popupIdx].poem.replace(/\n/g,'，'));
  u.lang='zh-CN';u.rate=.8;
  const zh=speechSynthesis.getVoices().find(v=>v.lang.startsWith('zh'));
  if(zh) u.voice=zh;
  speechSynthesis.speak(u);
});

// ── AUTO-TOUR (cinematic camera) ──
function toggleTour(){
  S.autoTour=!S.autoTour;
  document.getElementById('btn-tour').classList.toggle('on',S.autoTour);
  document.getElementById('btn-tour').textContent=S.autoTour?'⏸':'▶';
  if(S.autoTour){S.tourPhase=0;S.tourT=0;S.targetScale=1}
}
document.getElementById('btn-tour').addEventListener('click',toggleTour);

function tickTour(dt){
  if(!S.autoTour) return;
  S.tourT+=dt;
  // cinematic: slow zoom in → pan → zoom out → pan cycle
  const cycle=25;
  const phase=(S.tourT%cycle)/cycle;
  if(phase<.15) S.targetScale=1+.06*Math.sin(phase/.15*Math.PI);
  else if(phase<.85) S.targetScale=1;
  else S.targetScale=1+.04*Math.sin((phase-.85)/.15*Math.PI);
  S.targetX=clamp(S.targetX-.8);
  if(S.targetX<=clamp(-Infinity)){S.targetX=0;S.tourT=0}
}

// ── AMBIENT MUSIC (Web Audio pentatonic) ──
let aCtx=null,mGain=null,mStarted=false;
function toggleMusic(){
  if(mStarted){
    if(S.musicOn){aCtx.suspend();S.musicOn=false}
    else{aCtx.resume();S.musicOn=true}
  }else{
    aCtx=new(AudioContext||webkitAudioContext)();
    mGain=aCtx.createGain();mGain.gain.value=.1;mGain.connect(aCtx.destination);
    const notes=[293.66,349.23,392,440,523.25,587.33,698.46];
    let ni=0;
    (function play(){
      if(aCtx.state==='closed') return;
      const o=aCtx.createOscillator(),g=aCtx.createGain();
      o.type='sine';o.frequency.value=notes[ni++%notes.length];
      g.gain.setValueAtTime(.12,aCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+2.8);
      o.connect(g);g.connect(mGain);o.start();o.stop(aCtx.currentTime+3);
      setTimeout(play,1600+Math.random()*1400);
    })();
    mStarted=true;S.musicOn=true;
  }
  document.getElementById('btn-music').classList.toggle('on',S.musicOn);
  document.getElementById('btn-music').textContent=S.musicOn?'♫':'♪';
}
document.getElementById('btn-music').addEventListener('click',toggleMusic);

// ── MAIN LOOP ──
let prevT=0;
function tick(t){
  const dt=Math.min((t-prevT)/1000,.05);prevT=t;

  // smooth camera
  if(!S.dragging){
    S.camX+=(S.targetX-S.camX)*.08;
    if(Math.abs(S.targetX-S.camX)<.3) S.camX=S.targetX;
  }
  S.camScale+=(S.targetScale-S.camScale)*.05;

  tickTour(dt);
  applyParallax();
  updateProgress();

  // particles
  if(weatherSpawning) spawnParticles();
  tickParticles();
  tickClouds();
  tickRipples();

  requestAnimationFrame(tick);
}

// ── INIT ──
resize();
buildHotspots();
applyFocus();
requestAnimationFrame(tick);
window.addEventListener('resize',resize);
speechSynthesis.getVoices();
</script>
