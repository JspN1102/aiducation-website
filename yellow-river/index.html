<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>黃河萬里圖 · 數字長卷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root{
  --paper-cream:#f7f1e6;--paper-warm:#f0e8d8;--paper-tan:#e6dbc8;--paper-deep:#d9ccb4;
  --ink-100:#1c1710;--ink-90:#2e2820;--ink-80:#4a4238;--ink-60:#726a5e;--ink-40:#9e9688;--ink-20:#c5bfb4;
  --gold:#b8963e;--gold-light:#d4b35a;--seal-red:#c23a2e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Serif SC',serif;background:#2a2520;color:var(--ink-100);overflow:hidden;height:100vh;width:100vw;cursor:grab}
body.dragging{cursor:grabbing}

/* ═══ SCROLL VIEWPORT ═══ */
#scroll-viewport{position:fixed;inset:0;overflow:hidden}
#scroll-track{position:absolute;width:10000px;height:700px;top:50%;transform:translateY(-50%) translateX(0px);
  background:linear-gradient(180deg,#e8dcc8 0%,#ddd0b8 20%,#d4c4a0 40%,#c8b890 60%,#b0a070 80%,#8a7648 100%);
  transition:filter .6s ease}
.scroll-border{position:fixed;left:0;right:0;height:38px;z-index:10;
  background:linear-gradient(180deg,#f5edd5,#e0d4b8);pointer-events:none}
.scroll-border-top{top:calc(50% - 350px - 38px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.scroll-border-bottom{top:calc(50% + 350px);box-shadow:0 -4px 16px rgba(0,0,0,.25)}
.scroll-border::after{content:'';position:absolute;left:0;right:0;height:6px;
  background:repeating-linear-gradient(90deg,#c8b080,#c8b080 20px,#b8a070 20px,#b8a070 22px)}
.scroll-border-top::after{bottom:0}
.scroll-border-bottom::after{top:0}

/* ═══ CANVASES ═══ */
#weather-canvas,#ripple-canvas{position:fixed;inset:0;z-index:5;pointer-events:none}
#ripple-canvas{z-index:6}
#time-overlay{position:fixed;inset:0;z-index:4;pointer-events:none;transition:background .6s ease}
#fog-overlay{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity .8s ease;
  background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(240,235,220,.35),rgba(255,255,255,.4))}
#fog-overlay.active{opacity:1}

/* ═══ TITLE ═══ */
#title-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;pointer-events:none}
#title-bar h1{font-family:'Ma Shan Zheng',cursive;font-size:32px;color:var(--paper-cream);
  text-shadow:0 2px 8px rgba(0,0,0,.5);letter-spacing:.15em;white-space:nowrap}
#title-bar .subtitle{font-size:13px;color:var(--ink-20);letter-spacing:.3em;margin-top:2px}

/* ═══ PROGRESS BAR ═══ */
#progress-bar{position:fixed;top:calc(50% - 350px - 38px - 32px);left:5%;right:5%;height:24px;z-index:20;
  display:flex;border-radius:12px;overflow:hidden;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}
.prog-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;
  color:rgba(255,255,255,.5);letter-spacing:.08em;transition:all .4s ease;cursor:pointer;position:relative}
.prog-seg.active{color:#fff;background:rgba(184,150,62,.35)}
.prog-seg:hover{background:rgba(255,255,255,.1)}
.prog-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(184,150,62,.25);transition:width .3s ease}

/* ═══ CONTROL PANELS ═══ */
.ctrl-panel{position:fixed;z-index:20;display:flex;flex-direction:column;gap:6px}
.ctrl-group{display:flex;flex-direction:column;gap:3px;padding:8px;border-radius:8px;
  background:rgba(28,23,16,.55);backdrop-filter:blur(8px);border:1px solid rgba(184,150,62,.25)}
.ctrl-label{font-size:10px;color:var(--gold-light);letter-spacing:.15em;text-align:center;margin-bottom:2px}
.ctrl-btn{background:rgba(28,23,16,.4);border:1px solid rgba(184,150,62,.3);color:var(--paper-cream);
  padding:6px 10px;border-radius:4px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:12px;
  transition:all .3s ease;text-align:center;white-space:nowrap}
.ctrl-btn:hover{background:rgba(184,150,62,.2);border-color:var(--gold)}
.ctrl-btn.active{background:rgba(184,150,62,.3);border-color:var(--gold);color:var(--gold-light);
  box-shadow:0 0 8px rgba(184,150,62,.2)}
#season-panel{right:12px;top:calc(50% - 200px)}
#time-panel{right:12px;top:calc(50% - 40px)}
#weather-panel{right:12px;top:calc(50% + 100px)}

/* ═══ CHAPTER NAV ═══ */
#chapter-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;gap:4px;padding:6px 10px;border-radius:24px;
  background:rgba(28,23,16,.55);backdrop-filter:blur(8px);border:1px solid rgba(184,150,62,.2)}
.chap-btn{background:transparent;border:1px solid rgba(184,150,62,.25);color:var(--paper-cream);
  padding:6px 14px;border-radius:16px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:12px;
  transition:all .3s ease;white-space:nowrap}
.chap-btn:hover{background:rgba(184,150,62,.2);border-color:var(--gold)}
.chap-btn.active{background:rgba(184,150,62,.3);border-color:var(--gold);color:var(--gold-light)}
</style>
<style>
/* ═══ AUTO-TOUR + MUSIC BUTTONS ═══ */
#auto-tour-btn,#music-btn{position:fixed;z-index:20;width:40px;height:40px;border-radius:50%;
  background:rgba(28,23,16,.55);backdrop-filter:blur(8px);border:1px solid rgba(184,150,62,.3);
  color:var(--paper-cream);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all .3s ease}
#auto-tour-btn{left:16px;bottom:16px}
#music-btn{left:64px;bottom:16px}
#auto-tour-btn:hover,#music-btn:hover{background:rgba(184,150,62,.25);border-color:var(--gold)}
#auto-tour-btn.active{background:rgba(184,150,62,.35);border-color:var(--gold);box-shadow:0 0 12px rgba(184,150,62,.3)}

/* ═══ HOTSPOTS ═══ */
.hotspot{position:absolute;width:24px;height:24px;border-radius:50%;cursor:pointer;z-index:8;
  transform:translate(-50%,-50%)}
.hotspot-glow{position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(184,150,62,.6);
  animation:breathe 2.5s ease-in-out infinite;pointer-events:none}
.hotspot-dot{position:absolute;inset:6px;border-radius:50%;background:rgba(184,150,62,.8);
  box-shadow:0 0 8px rgba(184,150,62,.5)}
.hotspot-title{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:12px;color:var(--gold-light);background:rgba(28,23,16,.7);
  padding:3px 10px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;
  border:1px solid rgba(184,150,62,.3)}
.hotspot:hover .hotspot-title{opacity:1}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.5);opacity:.2}}

/* ═══ POPUP ═══ */
#popup-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(20,16,10,.6);backdrop-filter:blur(4px)}
#popup-overlay.open{display:flex}
.popup-card{position:relative;background:var(--paper-cream);color:var(--ink-90);
  border:2px solid var(--paper-deep);border-radius:4px;padding:36px 48px;max-width:440px;width:90%;
  box-shadow:0 8px 40px rgba(0,0,0,.4);animation:popIn .35s ease}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.popup-binding{position:absolute;top:8%;bottom:8%;width:3px;
  background:repeating-linear-gradient(180deg,var(--gold) 0,var(--gold) 6px,transparent 6px,transparent 10px)}
.popup-binding-l{left:14px}.popup-binding-r{right:14px}
.popup-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;
  color:var(--ink-40);cursor:pointer;transition:color .2s}.popup-close:hover{color:var(--ink-100)}
.popup-place{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:var(--ink-100);margin-bottom:2px}
.popup-province{font-size:12px;color:var(--ink-40);letter-spacing:.1em;margin-bottom:12px}
.popup-divider{height:1px;background:linear-gradient(90deg,transparent,var(--paper-deep),transparent);margin:12px 0}
.popup-poem-head{font-size:13px;color:var(--ink-60);margin-bottom:6px}
.popup-poem{font-size:15px;line-height:2.2;color:var(--ink-80);letter-spacing:.08em;white-space:pre-line}
.popup-desc{font-size:13px;line-height:1.9;color:var(--ink-60);margin-top:4px}
.popup-speak{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:6px 16px;
  background:rgba(184,150,62,.12);border:1px solid var(--gold);border-radius:16px;cursor:pointer;
  font-family:'Noto Serif SC',serif;font-size:12px;color:var(--gold);transition:all .3s}
.popup-speak:hover{background:rgba(184,150,62,.25)}

/* ═══ SCROLL HINT ═══ */
#scroll-hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.15em;animation:fadeHint 4s ease 2s forwards}
@keyframes fadeHint{to{opacity:0;pointer-events:none}}
</style>
</head>
<body>

<!-- ═══ SCROLL VIEWPORT ═══ -->
<div id="scroll-viewport">
  <div class="scroll-border scroll-border-top"></div>
  <div class="scroll-border scroll-border-bottom"></div>
  <div id="scroll-track">
    <!-- SVG landscape injected by JS -->
    <!-- Hotspots injected by JS -->
  </div>
  <canvas id="weather-canvas"></canvas>
  <canvas id="ripple-canvas"></canvas>

</div>

<!-- ═══ UI LAYER ═══ -->
<div id="title-bar">
  <h1>黃河萬里圖 · 數字長卷</h1>
  <div class="subtitle">YELLOW RIVER PANORAMIC SCROLL</div>
</div>

<div id="progress-bar"></div>

<div id="season-panel" class="ctrl-panel">
  <div class="ctrl-group">
    <div class="ctrl-label">四 季</div>
    <button class="ctrl-btn active" data-season="spring">春</button>

    <button class="ctrl-btn" data-season="winter">冬</button>
  </div>
</div>

<div id="time-panel" class="ctrl-panel">
  <div class="ctrl-group">
    <div class="ctrl-label">時 辰</div>
    <button class="ctrl-btn" data-time="dawn">晨</button>
    <button class="ctrl-btn active" data-time="day">昼</button>

<div id="weather-panel" class="ctrl-panel">

<!-- ═══ POPUP ═══ -->
<div id="popup-overlay">
  <div class="popup-card">
    <div class="popup-binding popup-binding-l"></div>
    <div class="popup-binding popup-binding-r"></div>
    <button class="popup-close">&times;</button>
    <div class="popup-place"></div>
    <div class="popup-province"></div>
    <div class="popup-divider"></div>
    <div class="popup-poem-head"></div>
    <div class="popup-poem"></div>
    <div class="popup-divider"></div>
    <div class="popup-desc"></div>
    <button class="popup-speak">&#9654; 朗讀詩詞</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   黃河萬里圖 · 數字長卷
   Interactive Yellow River Panoramic Scroll
   ═══════════════════════════════════════════════════ */

// ── 0. CONSTANTS ──
const SW=10000, SH=700, SECTIONS=[
  {name:'源頭·青海',start:0,end:1667},
  {name:'上游·甘肅',start:1667,end:3333},
  {name:'河套·寧夏',start:3333,end:5000},
  {name:'黃土·陝西',start:5000,end:6667},
  {name:'中原·河南',start:6667,end:8333},
  {name:'入海·山東',start:8333,end:10000}
];

const HOTSPOTS=[
  {x:800,y:280,title:'日月山',province:'青海',
   poemTitle:'涼州詞',author:'王之渙',
   poem:'黃河遠上白雲間，\n一片孤城萬仞山。\n羌笛何須怨楊柳，\n春風不度玉門關。',
   desc:'日月山位於青海湖東側，是古代中原通往西域的要道。文成公主入藏時曾在此回望長安，山因此得名。海拔3520米，是農牧區的天然分界線。'},
  {x:2200,y:250,title:'炳靈寺石窟',province:'甘肅',
   poemTitle:'使至塞上',author:'王維',
   poem:'單車欲問邊，屬國過居延。\n征蓬出漢塞，歸雁入胡天。\n大漠孤煙直，長河落日圓。\n蕭關逢候騎，都護在燕然。',
   desc:'炳靈寺石窟位於甘肅永靖縣，始建於西秦。黃河穿峽而過，石窟依崖而鑿，保存千年佛教造像，是絲綢之路上的藝術明珠。'},
  {x:3800,y:300,title:'沙坡頭',province:'寧夏',
   poemTitle:'渡黃河',author:'宋琬',
   poem:'倒瀉銀河事有無，\n掀天濁浪只須臾。\n人間更有風濤險，\n翻說黃河是畏途。',
   desc:'沙坡頭位於寧夏中衛，騰格里沙漠與黃河在此交匯。這裡是治沙奇蹟的誕生地，也是古絲路要衝，大漠孤煙與長河落日並存。'},
  {x:5400,y:220,title:'壺口瀑布',province:'陝西',
   poemTitle:'將進酒（節選）',author:'李白',
   poem:'君不見黃河之水天上來，\n奔流到海不復回。\n君不見高堂明鏡悲白髮，\n朝如青絲暮成雪。',
   desc:'壺口瀑布是黃河上最大的瀑布，河水從寬闊河面驟然收束跌入深槽，氣勢磅礴，聲震數里，被譽為「天下黃河一壺收」。'},
  {x:6500,y:260,title:'龍門石窟',province:'河南',
   poemTitle:'登鸛雀樓',author:'王之渙',
   poem:'白日依山盡，\n黃河入海流。\n欲窮千里目，\n更上一層樓。',
   desc:'龍門石窟位於洛陽伊河兩岸，始鑿於北魏，現存窟龕兩千餘個。盧舍那大佛雍容端莊，是中國石刻藝術的巔峰之作。'},
  {x:7500,y:320,title:'開封古城',province:'河南',
   poemTitle:'題臨安邸',author:'林升',
   poem:'山外青山樓外樓，\n西湖歌舞幾時休。\n暖風薰得遊人醉，\n直把杭州作汴州。',
   desc:'開封曾為北宋都城汴京，黃河多次改道經此，城下疊壓六座古城。清明上河圖描繪的正是這座城市的繁華盛景。'},
  {x:8800,y:200,title:'泰山',province:'山東',
   poemTitle:'望嶽',author:'杜甫',
   poem:'岱宗夫如何？齊魯青未了。\n造化鍾神秀，陰陽割昏曉。\n蕩胸生曾雲，決眥入歸鳥。\n會當凌絕頂，一覽眾山小。',
   desc:'泰山為五嶽之首，位於山東泰安。自秦始皇起歷代帝王封禪於此，是中華民族精神的象徵，聯合國教科文組織世界遺產。'},
  {x:9600,y:350,title:'黃河入海口',province:'山東',
   poemTitle:'浪淘沙',author:'劉禹錫',
   poem:'九曲黃河萬里沙，\n浪淘風簸自天涯。\n如今直上銀河去，\n同到牽牛織女家。',
   desc:'黃河入海口位於山東東營，河水攜帶泥沙在此匯入渤海，每年新造陸地約25平方公里，是中國最年輕的土地。'}
];

const SEASON_FILTERS={
  spring:'hue-rotate(-8deg) saturate(1.15) brightness(1.05)',
  summer:'saturate(1.4) brightness(1.05) contrast(1.05)',
  autumn:'sepia(.3) saturate(1.2) hue-rotate(-15deg) brightness(.95)',
  winter:'saturate(.35) brightness(.85) hue-rotate(15deg) contrast(1.1)'
};
const TIME_BG={
  dawn:'linear-gradient(180deg,rgba(255,180,100,.2),rgba(255,140,60,.15),transparent)',
  day:'none',
  dusk:'linear-gradient(180deg,rgba(200,80,40,.25),rgba(180,60,30,.2),rgba(40,20,60,.15))',
  night:'linear-gradient(180deg,rgba(10,15,40,.55),rgba(15,20,50,.5),rgba(10,15,40,.6))'
};

// ── 1. STATE ──
const S={scrollX:0,targetX:0,dragging:false,dragSX:0,dragSS:0,velX:0,lastDragX:0,lastDragT:0,
  season:'spring',time:'day',weather:'clear',autoTour:false,musicOn:false,popupIdx:-1};
// ── 2. DOM REFS ──
const track=document.getElementById('scroll-track');
const wCanvas=document.getElementById('weather-canvas');
const rCanvas=document.getElementById('ripple-canvas');
const wCtx=wCanvas.getContext('2d');
const rCtx=rCanvas.getContext('2d');
const timeOv=document.getElementById('time-overlay');
const fogOv=document.getElementById('fog-overlay');
const progBar=document.getElementById('progress-bar');
const chapNav=document.getElementById('chapter-nav');
const popupOv=document.getElementById('popup-overlay');
const autoBtn=document.getElementById('auto-tour-btn');
const musicBtn=document.getElementById('music-btn');
let W=window.innerWidth, H=window.innerHeight, dpr=window.devicePixelRatio||1;

function resizeCanvases(){
  W=window.innerWidth;H=window.innerHeight;dpr=window.devicePixelRatio||1;
  [wCanvas,rCanvas].forEach(c=>{c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
    c.getContext('2d').scale(dpr,dpr)});
}

// ── 3. SVG LANDSCAPE GENERATOR ──
function buildLandscape(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 10000 700');
  svg.setAttribute('width','10000');svg.setAttribute('height','700');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%';

  const defs=document.createElementNS(ns,'defs');
  // water gradient
  const wg=document.createElementNS(ns,'linearGradient');wg.id='waterG';
  wg.setAttribute('x1','0');wg.setAttribute('y1','0');wg.setAttribute('x2','1');wg.setAttribute('y2','0');
  [[0,'#5a8a7a'],[.3,'#6a9a88'],[.6,'#7aaa96'],[1,'#5a8a7a']].forEach(([o,c])=>{
    const s=document.createElementNS(ns,'stop');s.setAttribute('offset',o);s.setAttribute('stop-color',c);
    s.setAttribute('stop-opacity','0.4');wg.appendChild(s)});
  defs.appendChild(wg);
  svg.appendChild(defs);

  const sectionData=[
    {bg:'#8a9aaa',layers:[
      {d:'M0 250Q200 180 400 220Q600 150 800 200Q1000 120 1200 180Q1400 100 1667 160L1667 700L0 700Z',fill:'rgba(80,90,100,.15)'},
      {d:'M0 320Q250 240 500 280Q750 200 1000 260Q1250 180 1500 230Q1667 210 1667 700L0 700Z',fill:'rgba(70,80,90,.25)'},
      {d:'M0 400Q200 350 450 380Q700 320 900 370Q1100 340 1400 360Q1667 350 1667 700L0 700Z',fill:'rgba(60,70,80,.35)'},
      {d:'M0 520Q400 500 800 510Q1200 490 1667 505L1667 580Q1200 570 800 575Q400 565 0 570Z',fill:'url(#waterG)'}
    ]},
    {bg:'#9a8a70',layers:[

// ── 4. SCROLL ENGINE ──
function clampX(x){return Math.max(-(SW-W),Math.min(0,x))}
function applyScroll(){
  track.style.transform=`translateY(-50%) translateX(${S.scrollX}px)`;
  updateProgress();
}
function scrollTo(x,smooth){
  S.targetX=clampX(x);
  if(!smooth) S.scrollX=S.targetX;
}

// wheel
document.addEventListener('wheel',e=>{
  e.preventDefault();
  S.targetX=clampX(S.targetX - e.deltaY*1.5);
  if(S.autoTour) toggleAutoTour();
},{passive:false});

// drag
document.addEventListener('pointerdown',e=>{
  if(e.target.closest('.ctrl-panel,.ctrl-btn,.chap-btn,#auto-tour-btn,#music-btn,#popup-overlay,.hotspot')) return;
  S.dragging=true;S.dragSX=e.clientX;S.dragSS=S.scrollX;S.velX=0;S.lastDragX=e.clientX;S.lastDragT=Date.now();
  document.body.classList.add('dragging');
});
document.addEventListener('pointermove',e=>{
  if(!S.dragging) return;
  const dx=e.clientX-S.dragSX;
  S.scrollX=clampX(S.dragSS+dx);S.targetX=S.scrollX;
  const now=Date.now(),dt=now-S.lastDragT;
  if(dt>0) S.velX=(e.clientX-S.lastDragX)/dt*16;
  S.lastDragX=e.clientX;S.lastDragT=now;
  if(S.autoTour) toggleAutoTour();
});
document.addEventListener('pointerup',()=>{
  if(!S.dragging) return;
  S.dragging=false;document.body.classList.remove('dragging');
  S.targetX=clampX(S.scrollX+S.velX*12);
});

// ── 5. PROGRESS BAR + CHAPTER NAV ──
SECTIONS.forEach((sec,i)=>{
  const d=document.createElement('div');d.className='prog-seg';d.textContent=sec.name;
  d.addEventListener('click',()=>scrollTo(-sec.start,true));
  progBar.appendChild(d);
  const b=document.createElement('button');b.className='chap-btn';b.textContent=sec.name;
  b.addEventListener('click',()=>scrollTo(-sec.start,true));
  chapNav.appendChild(b);
});
function updateProgress(){
  const pos=-S.scrollX;
  const segs=progBar.children;const chaps=chapNav.children;
  for(let i=0;i<SECTIONS.length;i++){
    const s=SECTIONS[i],active=pos>=s.start&&pos<s.end;
    segs[i].classList.toggle('active',active);
    chaps[i].classList.toggle('active',active);
  }
}

// ── 6. SEASON / TIME / WEATHER ──
document.querySelectorAll('[data-season]').forEach(b=>b.addEventListener('click',()=>{
  S.season=b.dataset.season;
  document.querySelectorAll('[data-season]').forEach(x=>x.classList.toggle('active',x===b));
  track.style.filter=SEASON_FILTERS[S.season];
}));
document.querySelectorAll('[data-time]').forEach(b=>b.addEventListener('click',()=>{
  S.time=b.dataset.time;
  document.querySelectorAll('[data-time]').forEach(x=>x.classList.toggle('active',x===b));
  timeOv.style.background=TIME_BG[S.time];
}));
document.querySelectorAll('[data-weather]').forEach(b=>b.addEventListener('click',()=>{
  S.weather=b.dataset.weather;
  document.querySelectorAll('[data-weather]').forEach(x=>x.classList.toggle('active',x===b));
  fogOv.classList.toggle('active',S.weather==='fog');
  if(S.weather==='clear'||S.weather==='fog') weatherSpawning=false;
  else{weatherSpawning=true;weatherParticles=[];spawnWeather()}
}));

// ── 7. WEATHER PARTICLES ──
let weatherParticles=[],weatherSpawning=false;
function spawnWeather(){
  if(!weatherSpawning) return;
  const n=S.weather==='rain'?250:120;
  while(weatherParticles.length<n){
    if(S.weather==='rain')
      weatherParticles.push({x:Math.random()*W*1.2,y:Math.random()*H-H,
        vx:-1.5-Math.random(),vy:12+Math.random()*6,len:10+Math.random()*8,
        o:.2+Math.random()*.4,type:'rain'});
    else
      weatherParticles.push({x:Math.random()*W,y:Math.random()*H-H,
        vx:0,vy:.4+Math.random()*1.2,r:1.5+Math.random()*2.5,phase:Math.random()*Math.PI*2,
        o:.4+Math.random()*.4,type:'snow'});
  }
}
function updateWeather(dt){
  for(let i=weatherParticles.length-1;i>=0;i--){
    const p=weatherParticles[i];
    if(p.type==='rain'){p.x+=p.vx;p.y+=p.vy}
    else{p.x+=Math.sin(p.phase+=.01)*.3;p.y+=p.vy}
    if(p.y>H+20||p.x<-30){
      if(weatherSpawning){p.y=-20;p.x=Math.random()*W*1.2}
      else weatherParticles.splice(i,1);
    }
  }
}
function drawWeather(){
  wCtx.clearRect(0,0,W,H);
  weatherParticles.forEach(p=>{
    if(p.type==='rain'){
      wCtx.strokeStyle=`rgba(200,210,220,${p.o})`;wCtx.lineWidth=1;
      wCtx.beginPath();wCtx.moveTo(p.x,p.y);wCtx.lineTo(p.x+p.vx*1.5,p.y+p.len);wCtx.stroke();
    }else{
      wCtx.fillStyle=`rgba(255,255,255,${p.o})`;
      wCtx.beginPath();wCtx.arc(p.x,p.y,p.r,0,Math.PI*2);wCtx.fill();
    }
  });
}

// ── 8. WATER RIPPLES ──
let ripples=[],lastRippleT=0;
document.addEventListener('pointermove',e=>{
  const trackRect=track.getBoundingClientRect();
  const relY=e.clientY-trackRect.top;
  if(relY<SH*.5||relY>SH) return;
  const now=Date.now();
  if(now-lastRippleT<150) return;
  lastRippleT=now;
  ripples.push({x:e.clientX,y:e.clientY,r:0,maxR:40+Math.random()*30,o:.5,born:now});
});
function updateRipples(){
  for(let i=ripples.length-1;i>=0;i--){
    const rp=ripples[i];
    rp.r+=.8;rp.o=Math.max(0,.5*(1-rp.r/rp.maxR));
    if(rp.o<=0) ripples.splice(i,1);
  }
}
function drawRipples(){
  rCtx.clearRect(0,0,W,H);
  rCtx.globalCompositeOperation='lighter';
  ripples.forEach(rp=>{
    for(let j=0;j<3;j++){
      const rr=rp.r-j*8;if(rr<0) continue;
      rCtx.strokeStyle=`rgba(180,200,210,${rp.o*(1-j*.3)})`;
      rCtx.lineWidth=1.5-j*.4;
      rCtx.beginPath();rCtx.arc(rp.x,rp.y,rr,0,Math.PI*2);rCtx.stroke();
    }
  });
  rCtx.globalCompositeOperation='source-over';
}
// ── 9. HOTSPOTS ──
let hotspotEls=[];
function buildHotspots(){
  HOTSPOTS.forEach((h,i)=>{
    const el=document.createElement('div');el.className='hotspot';
    el.style.left=h.x+'px';el.style.top=h.y+'px';
    el.innerHTML=`<div class="hotspot-glow"></div><div class="hotspot-dot"></div><div class="hotspot-title">${h.title}</div>`;
    let downX=0,downY=0;
    el.addEventListener('pointerdown',e=>{downX=e.clientX;downY=e.clientY});
    el.addEventListener('pointerup',e=>{
      if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)<8) openPopup(i);
    });
    track.appendChild(el);hotspotEls.push(el);
  });
}
function openPopup(i){
  S.popupIdx=i;const h=HOTSPOTS[i];
  popupOv.querySelector('.popup-place').textContent=h.title;
  popupOv.querySelector('.popup-province').textContent=h.province;
  popupOv.querySelector('.popup-poem-head').textContent=`${h.poemTitle} · ${h.author}`;
  popupOv.querySelector('.popup-poem').textContent=h.poem;
  popupOv.querySelector('.popup-desc').textContent=h.desc;
  popupOv.classList.add('open');
}
function closePopup(){S.popupIdx=-1;popupOv.classList.remove('open');speechSynthesis.cancel()}
popupOv.querySelector('.popup-close').addEventListener('click',closePopup);
popupOv.addEventListener('click',e=>{if(e.target===popupOv) closePopup()});
popupOv.querySelector('.popup-speak').addEventListener('click',()=>{
  if(S.popupIdx<0) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(HOTSPOTS[S.popupIdx].poem.replace(/\n/g,'，'));
  u.lang='zh-CN';u.rate=.8;
  const voices=speechSynthesis.getVoices();
  const zh=voices.find(v=>v.lang.startsWith('zh'));
  if(zh) u.voice=zh;
  speechSynthesis.speak(u);
});

// ── 10. AUTO-TOUR ──
function toggleAutoTour(){
  S.autoTour=!S.autoTour;
  autoBtn.classList.toggle('active',S.autoTour);
  autoBtn.textContent=S.autoTour?'⏸':'▶';
}
autoBtn.addEventListener('click',toggleAutoTour);

// ── 11. CLOUD RISING EFFECT ──
let clouds=[];
track.addEventListener('click',e=>{
  const rect=track.getBoundingClientRect();
  const rx=e.clientX-rect.left, ry=e.clientY-rect.top;
  if(ry>SH*.6) return;
  for(let i=0;i<5;i++){
    clouds.push({x:e.clientX+(-20+Math.random()*40),y:e.clientY,
      vx:(-1+Math.random()*2)*.3,vy:-.5-Math.random()*.5,
      r:15+Math.random()*20,o:.35,life:0,maxLife:180});
  }
});
function updateClouds(){
  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];c.x+=c.vx;c.y+=c.vy;c.life++;c.r+=.15;
    c.o=.35*(1-c.life/c.maxLife);
    if(c.life>=c.maxLife) clouds.splice(i,1);
  }
}
function drawClouds(){
  clouds.forEach(c=>{
    const g=wCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    g.addColorStop(0,`rgba(240,235,220,${c.o})`);g.addColorStop(1,`rgba(240,235,220,0)`);
    wCtx.fillStyle=g;wCtx.beginPath();wCtx.arc(c.x,c.y,c.r,0,Math.PI*2);wCtx.fill();
  });
}

// ── 12. AMBIENT MUSIC (Web Audio API pentatonic) ──
let audioCtx=null,musicGain=null,musicStarted=false;
function startMusic(){
  if(musicStarted){
    if(S.musicOn){audioCtx.suspend();S.musicOn=false}
    else{audioCtx.resume();S.musicOn=true}
    musicBtn.textContent=S.musicOn?'♫':'♪';return;
  }
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();musicGain.gain.value=.12;musicGain.connect(audioCtx.destination);
  const notes=[293.66,349.23,392.00,440.00,523.25,587.33,698.46];
  let noteIdx=0;
  function playNote(){
    if(audioCtx.state==='closed') return;
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=notes[noteIdx%notes.length];
    g.gain.setValueAtTime(.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+2.5);
    osc.connect(g);g.connect(musicGain);
    osc.start();osc.stop(audioCtx.currentTime+2.8);
    noteIdx++;
    setTimeout(playNote,1800+Math.random()*1200);
  }
  playNote();musicStarted=true;S.musicOn=true;musicBtn.textContent='♫';
}
musicBtn.addEventListener('click',startMusic);

// ── 13. MAIN LOOP ──
let lastT=0;
function tick(t){
  const dt=Math.min((t-lastT)/1000,.05);lastT=t;
  // smooth scroll
  if(!S.dragging){
    S.scrollX+=(S.targetX-S.scrollX)*.12;
    if(Math.abs(S.targetX-S.scrollX)<.5) S.scrollX=S.targetX;
  }
  // auto-tour
  if(S.autoTour){
    S.targetX=clampX(S.targetX-.6);
    if(S.targetX<=-(SW-W)) toggleAutoTour();
  }
  applyScroll();
  // weather
  if(weatherSpawning) spawnWeather();
  updateWeather(dt);
  drawWeather();
  updateClouds();drawClouds();
  // ripples
  updateRipples();drawRipples();
  requestAnimationFrame(tick);
}

// ── 14. INIT ──
function init(){
  resizeCanvases();
  buildLandscape();
  buildHotspots();
  track.style.filter=SEASON_FILTERS.spring;
  requestAnimationFrame(tick);
  window.addEventListener('resize',()=>{resizeCanvases();S.targetX=clampX(S.targetX)});
  speechSynthesis.getVoices();
}
init();
</script>
