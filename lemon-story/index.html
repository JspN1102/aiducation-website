<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>柠檬的一生 — AIDUCATION</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #ece7db;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      font-family: 'Noto Serif SC', serif;
    }

    #lemon-wrap {
      width: 100%; max-width: 560px;
      background: #f5f0e8; border-radius: 20px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }

    /* ── 场景区 ── */
    #scene { width: 100%; height: 340px; position: relative; overflow: hidden; }

    #sky {
      position: absolute; inset: 0 0 80px 0;
      background: #b8d5e8; transition: background 1.5s ease;
    }
    #ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
      background: #6b4c2a;
    }
    #ground::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 18px; background: #8a6535;
    }

    /* 雨 */
    #rain-layer { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
    .raindrop {
      position: absolute; width: 1.5px; height: 12px;
      background: #a8d4ee; border-radius: 1px; opacity: 0;
      animation: fall 0.7s linear infinite;
    }
    @keyframes fall { 0% { transform: translateY(-20px); opacity: 0.6; } 100% { transform: translateY(360px); opacity: 0; } }

    /* 太阳 */
    #sun {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: #ffd04d; top: 30px; right: 60px;
      opacity: 0; transform: scale(0.5);
      transition: opacity 1.5s ease, transform 1.5s ease; z-index: 2;
    }

    /* 幼苗 */
    #sprout {
      position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
      width: 8px; height: 0px; background: #4a8c3a; border-radius: 4px;
      opacity: 0; transition: height 1s ease, opacity 0.5s ease; z-index: 5;
    }
    #sprout.leafy::after {
      content: ''; position: absolute; top: 0; left: -5px;
      width: 16px; height: 14px; background: #5ab04a;
      border-radius: 50% 50% 50% 0; transform: rotate(-30deg);
    }

    /* 树 */
    #tree-container {
      position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
      width: 220px; display: flex; flex-direction: column; align-items: center; z-index: 4;
    }
    #trunk {
      width: 14px; height: 0px; background: #5c3d1a; border-radius: 3px;
      transition: height 1.2s cubic-bezier(.22,.68,0,1.2); position: relative; z-index: 2;
    }
    #canopy {
      position: relative; width: 0px; height: 0px;
      transition: width 1.2s ease, height 1.2s ease; overflow: visible;
    }
    /* 叶片团 */
    .leaf-cluster {
      position: absolute; background: #3d8f32; border-radius: 50%;
      opacity: 0; transform: scale(0);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(.34,1.56,.64,1);
    }
    /* 花 */
    .flower {
      position: absolute; width: 12px; height: 12px;
      opacity: 0; transform: scale(0);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1); z-index: 6;
    }
    .flower::before {
      content: ''; position: absolute; inset: 0;
      background: white; border-radius: 50%;
      box-shadow: 0 -5px 0 0 white, 0 5px 0 0 white, -5px 0 0 0 white, 5px 0 0 0 white;
    }
    .flower::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 8px; height: 8px; background: #ffd04d; border-radius: 50%;
    }
    /* 柠檬 */
    .lemon {
      position: absolute; width: 0px; height: 0px;
      background: #e8d44d; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      opacity: 0; transition: all 1.2s cubic-bezier(.34,1.2,.64,1); z-index: 7;
    }
    .lemon.ripe { background: #f0c830; }
    /* 蜜蜂 */
    .bee {
      position: absolute; width: 16px; height: 10px;
      opacity: 0; transition: opacity 0.6s ease; z-index: 10;
    }
    .bee::before {
      content: ''; position: absolute; inset: 0;
      background: #ffc107; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      border: 1.5px solid #e6a800;
    }
    .bee::after {
      content: ''; position: absolute; top: -6px; left: 1px;
      width: 14px; height: 8px; background: rgba(200,230,255,0.7); border-radius: 50%;
    }

    /* ── 文字面板 ── */
    #text-panel {
      padding: 20px 28px 12px; background: #f5f0e8;
      min-height: 130px; border-top: 1px solid #e0d5c0;
    }
    #poem-text {
      font-size: 18px; line-height: 2.2; color: #3d2e1a;
      letter-spacing: 0.08em; min-height: 56px;
    }
    .char {
      display: inline; cursor: pointer; transition: color 0.15s, opacity 0.15s;
    }
    .char.read { color: #2E7D32; }
    .char.next { color: #3d2e1a; font-weight: 600; border-bottom: 2px solid #8a6535; }
    .char.unread { color: #c8bc9e; cursor: default; }

    #progress-bar { display: flex; gap: 6px; margin-top: 14px; }
    .prog-dot {
      height: 3px; flex: 1; background: #c8bc9e; border-radius: 2px;
      transition: background 0.4s ease;
    }
    .prog-dot.active { background: #8a6535; }

    #hint {
      text-align: center; padding: 10px 0 18px;
      font-size: 13px; color: #a09580; letter-spacing: 0.1em;
    }
</style>
</head>
<body>
<div id="lemon-wrap">
  <div id="scene">
    <div id="sky"></div>
    <div id="rain-layer"></div>
    <div id="sun"></div>
    <div id="sprout"></div>
    <div id="tree-container">
      <div id="canopy"></div>
      <div id="trunk"></div>
    </div>
    <div id="ground"></div>
  </div>
  <div id="text-panel">
    <div id="poem-text"></div>
    <div id="progress-bar"></div>
  </div>
  <div id="hint">点击文字或按 → 键逐字朗读</div>
</div>
<script>
/* ══ 剧本：7 阶段，按进度百分比触发 ══ */
const sentences = [
  "在松软的果园泥土中，藏着一粒柠檬籽。",
  "一阵清凉的夏雨过后，金灿灿的阳光洒满大地。",
  "吸足了水分的幼苗，悄悄地钻出了地面。",
  "它一天天长高，变成了一棵枝繁叶茂的小树。",
  "不久后，树上开出了一簇簇洁白的小花。",
  "贪玩的小蜜蜂闻香而来，在树上忙碌地飞舞。",
  "到了丰收的季节，枝丫间挂满了酸甜多汁的黄柠檬。",
];

/* 拍平所有字符 */
const allChars = [];
sentences.forEach((s, si) => [...s].forEach((ch, ci) => allChars.push({ ch, si, ci })));
const totalChars = allChars.length;

/* 每句起始 index */
const sentenceStarts = [];
let acc = 0;
sentences.forEach(s => { sentenceStarts.push(acc); acc += s.length; });

/* ══ DOM ══ */
const skyEl     = document.getElementById('sky');
const sunEl     = document.getElementById('sun');
const rainLayer = document.getElementById('rain-layer');
const sproutEl  = document.getElementById('sprout');
const trunkEl   = document.getElementById('trunk');
const canopyEl  = document.getElementById('canopy');
const poemEl    = document.getElementById('poem-text');
const progressBar = document.getElementById('progress-bar');
const hintEl    = document.getElementById('hint');

/* 进度点 */
sentences.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'prog-dot'; dot.id = 'dot-' + i;
  progressBar.appendChild(dot);
});

/* ══ 场景控制函数 ══ */
function setSky(c) { skyEl.style.background = c; }
function showSun(v) { sunEl.style.opacity = v?'1':'0'; sunEl.style.transform = v?'scale(1)':'scale(0.5)'; }

let rainDrops = [];
function showRain(v) {
  if (v && rainDrops.length === 0) {
    for (let i = 0; i < 22; i++) {
      const d = document.createElement('div');
      d.className = 'raindrop';
      d.style.left = (Math.random()*100)+'%';
      d.style.animationDelay = (Math.random()*0.7)+'s';
      d.style.animationDuration = (0.5+Math.random()*0.4)+'s';
      rainLayer.appendChild(d); rainDrops.push(d);
    }
  } else if (!v) { rainDrops.forEach(d=>d.remove()); rainDrops=[]; }
}

function setSprout(h, leaf) {
  sproutEl.style.height = h+'px'; sproutEl.style.opacity = h>0?'1':'0';
  leaf ? sproutEl.classList.add('leafy') : sproutEl.classList.remove('leafy');
}
function setTrunk(h) { trunkEl.style.height = h+'px'; }

let flowersEls=[], lemonsEls=[], beeEls=[], beeTimers=[];

function hideCanopy() {
  canopyEl.innerHTML=''; flowersEls=[]; lemonsEls=[];
  canopyEl.style.width='0px'; canopyEl.style.height='0px';
}
function showCanopy() {
  canopyEl.style.width='200px'; canopyEl.style.height='160px';
  const clusters = [
    {left:50,top:30,w:90,h:80,delay:0},{left:10,top:60,w:70,h:65,delay:.15},
    {left:120,top:60,w:70,h:65,delay:.2},{left:60,top:80,w:80,h:60,delay:.3},
    {left:20,top:90,w:55,h:50,delay:.4},{left:125,top:90,w:55,h:50,delay:.45},
  ];
  clusters.forEach(c => {
    const el = document.createElement('div');
    el.className = 'leaf-cluster';
    el.style.cssText = `left:${c.left}px;top:${c.top}px;width:${c.w}px;height:${c.h}px;transition-delay:${c.delay}s`;
    canopyEl.appendChild(el);
    setTimeout(() => { el.style.opacity='1'; el.style.transform='scale(1)'; }, 30);
  });
  const fpos = [{left:55,top:20},{left:100,top:35},{left:140,top:55},{left:35,top:65},
    {left:75,top:75},{left:120,top:85},{left:55,top:100},{left:95,top:110},{left:160,top:80},{left:25,top:90}];
  fpos.forEach(p => {
    const f = document.createElement('div'); f.className='flower';
    f.style.left=p.left+'px'; f.style.top=p.top+'px';
    canopyEl.appendChild(f); flowersEls.push(f);
  });
  const lpos = [{left:53,top:18},{left:98,top:33},{left:138,top:53},{left:33,top:63},
    {left:73,top:73},{left:118,top:83},{left:53,top:98},{left:93,top:108},{left:158,top:78},{left:23,top:88}];
  lpos.forEach(p => {
    const l = document.createElement('div'); l.className='lemon';
    l.style.left=p.left+'px'; l.style.top=p.top+'px';
    canopyEl.appendChild(l); lemonsEls.push(l);
  });
}

function showFlowers(v) {
  flowersEls.forEach((f,i) => setTimeout(() => {
    f.style.opacity=v?'1':'0'; f.style.transform=v?'scale(1)':'scale(0)';
  }, i*60));
}
function showLemons(v) {
  lemonsEls.forEach((l,i) => setTimeout(() => {
    l.style.opacity=v?'1':'0'; l.style.width=v?'22px':'0'; l.style.height=v?'18px':'0';
    if(v) setTimeout(()=>l.classList.add('ripe'),800);
  }, i*80));
}
function showBees(v) {
  if(!v||beeEls.length>0) return;
  [{left:-20,top:50},{left:230,top:90},{left:100,top:-10}].forEach((pos,i) => {
    const bee = document.createElement('div'); bee.className='bee';
    bee.style.left=pos.left+'px'; bee.style.top=pos.top+'px';
    canopyEl.appendChild(bee); beeEls.push(bee);
    setTimeout(() => { bee.style.opacity='1'; animBee(bee); }, i*400);
  });
}
function animBee(bee) {
  (function move() {
    const tx=20+Math.random()*160, ty=10+Math.random()*130, dur=800+Math.random()*1200;
    bee.style.transition=`left ${dur}ms ease-in-out, top ${dur}ms ease-in-out`;
    bee.style.left=tx+'px'; bee.style.top=ty+'px';
    beeTimers.push(setTimeout(move, dur+100));
  })();
}
function hideBees() { beeTimers.forEach(clearTimeout); beeTimers=[]; beeEls.forEach(b=>b.remove()); beeEls=[]; }

/* ══ 阶段触发器（按句子 index） ══ */
let triggeredStages = new Set();

const stageActions = [
  () => { setSky('#b8d5e8'); showRain(true); },
  () => { showRain(false); showSun(true); setSky('#d4eaf7'); },
  () => { setSprout(24, true); },
  () => { setSprout(0, false); setTimeout(()=>{ setTrunk(90); setTimeout(showCanopy, 700); }, 200); },
  () => { showFlowers(true); },
  () => { showBees(true); },
  () => { showFlowers(false); hideBees(); setTimeout(()=>showLemons(true), 600); setSky('#e8f4d4'); },
];

function triggerStage(si) {
  if (triggeredStages.has(si)) return;
  triggeredStages.add(si);
  if (stageActions[si]) stageActions[si]();
}

/* ══ 渲染文字 ══ */
let readCount = 0;
let charSpans = [];

function renderText() {
  poemEl.innerHTML = '';
  charSpans = [];
  sentences.forEach((s, si) => {
    const p = document.createElement('p');
    p.style.margin = '0 0 6px';
    [...s].forEach((ch, ci) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      const gIdx = sentenceStarts[si] + ci;
      span.dataset.idx = gIdx;
      p.appendChild(span);
      charSpans.push(span);
    });
    poemEl.appendChild(p);
  });
  updateChars();
}

function updateChars() {
  charSpans.forEach((span, i) => {
    span.classList.remove('read','next','unread');
    if (i < readCount) span.classList.add('read');
    else if (i === readCount) span.classList.add('next');
    else span.classList.add('unread');
  });
  /* 更新进度点 */
  const curSi = readCount < totalChars ? allChars[readCount].si : sentences.length - 1;
  document.querySelectorAll('.prog-dot').forEach((d,i) => d.classList.toggle('active', i <= curSi));
  /* 触发当前句子的场景 */
  triggerStage(curSi);
  /* 提示 */
  hintEl.textContent = readCount >= totalChars
    ? '故事结束 · 按 ← 回退 或点击重新开始'
    : `点击文字或按 → 键朗读 · ${readCount}/${totalChars}`;
}

function advance() {
  if (readCount < totalChars) { readCount++; updateChars(); }
}
function goBack() {
  if (readCount > 0) { readCount--; updateChars(); }
}
function restart() {
  readCount = 0; triggeredStages.clear();
  hideBees(); hideCanopy(); showRain(false); showSun(false);
  setSky('#b8d5e8'); setTrunk(0); setSprout(0, false);
  renderText();
}

/* 点击文字 */
poemEl.addEventListener('click', e => {
  const span = e.target.closest('.char.next');
  if (span) advance();
});

/* 键盘 */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { e.preventDefault(); advance(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

/* 提示区点击重新开始 */
hintEl.addEventListener('click', () => { if (readCount >= totalChars) restart(); });

/* 初始化 */
renderText();
triggerStage(0);
</script>
</body>
</html>
