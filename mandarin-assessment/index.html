<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>楓橋夜泊 · 普通話朗讀測評</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600&family=Inter:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5f0e6;
  --paper-warm: #efe8da;
  --ink: #1a1612;
  --ink-80: #3d3630;
  --ink-60: #6b6259;
  --ink-40: #9e9488;
  --ink-20: #c9c1b5;
  --ink-10: #e2ddd5;
  --green: #2f5d4f;
  --green-light: #4a8a76;
  --green-bg: rgba(47,93,79,0.08);
  --red: #b73e3a;
  --red-light: #d05550;
  --red-bg: rgba(183,62,58,0.06);
  --gold: #b8923f;
  --gold-light: #d4ad55;
  --gold-bg: rgba(184,146,63,0.08);
  --radius: 14px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 4px rgba(26,22,18,0.05);
  --shadow-md: 0 4px 20px rgba(26,22,18,0.07);
  --shadow-lg: 0 8px 40px rgba(26,22,18,0.1);
  --font-serif: 'Noto Serif TC', 'Songti TC', serif;
  --font-sans: 'Noto Sans TC', -apple-system, sans-serif;
  --font-num: 'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-sans);
  background: var(--paper);
  color: var(--ink);
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
}

.bg-texture {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(26,22,18,0.006) 3px, rgba(26,22,18,0.006) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(26,22,18,0.003) 5px, rgba(26,22,18,0.003) 6px),
    radial-gradient(ellipse at 20% 15%, rgba(184,146,63,0.025) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(183,62,58,0.015) 0%, transparent 50%);
}

/* PAGE SYSTEM */
.page {
  position: absolute; inset: 0; z-index: 1;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
  display: flex; flex-direction: column; align-items: center;
  overflow: hidden;
}
.page.active { opacity: 1; pointer-events: all; }
.page-inner {
  width: 100%; max-width: 480px; padding: 0 24px;
  display: flex; flex-direction: column; align-items: center;
  height: 100%; overflow: hidden;
}
.page-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 32px; }

/* ===== COVER ===== */
.cover-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 40px 24px; gap: 0;
}
.cover-avatar {
  width: 140px; height: 140px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 3px solid #fff;
  box-shadow: 0 4px 24px rgba(26,22,18,0.1);
  margin-bottom: 32px;
}
.cover-seal {
  font-family: var(--font-num); font-weight: 600; font-size: 10px;
  letter-spacing: 3px; color: var(--red);
  border: 1.5px solid var(--red); padding: 3px 10px;
  transform: rotate(-2deg); margin-bottom: 24px; opacity: 0.8;
}
.cover-title {
  font-family: var(--font-serif); font-weight: 900;
  font-size: clamp(40px, 9vw, 52px); letter-spacing: 10px;
  color: var(--ink); line-height: 1.3; margin-bottom: 10px;
}
.cover-author {
  font-family: var(--font-serif); font-weight: 400;
  font-size: 16px; color: var(--ink-60); letter-spacing: 4px;
  margin-bottom: 28px;
}
.cover-divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ink-20), transparent);
  margin-bottom: 28px;
}
.cover-school {
  font-family: var(--font-sans); font-weight: 400;
  font-size: 13px; color: var(--ink-60); text-align: center;
  line-height: 2; letter-spacing: 1px; margin-bottom: 40px;
}
.cover-class { font-size: 12px; color: var(--ink-40); }
.cover-footer {
  position: absolute; bottom: 28px;
  font-family: var(--font-num); font-size: 10px;
  color: var(--ink-40); letter-spacing: 2px;
}

/* ===== BUTTONS ===== */
.btn-primary {
  font-family: var(--font-sans); font-weight: 500;
  font-size: 15px; letter-spacing: 2px;
  color: #fff; background: var(--green);
  border: none; border-radius: 28px;
  padding: 14px 44px; cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 3px 16px rgba(47,93,79,0.25);
}
.btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); box-shadow: 0 1px 8px rgba(47,93,79,0.2); }

.btn-outline {
  font-family: var(--font-sans); font-weight: 500;
  font-size: 13px; letter-spacing: 1px;
  color: var(--green); background: transparent;
  border: 1.5px solid var(--green); border-radius: 24px;
  padding: 10px 24px; cursor: pointer; transition: all 0.3s ease;
}
.btn-outline:hover { background: var(--green-bg); }

.btn-back {
  font-size: 18px; color: var(--ink-60); background: none;
  border: none; cursor: pointer; padding: 8px 12px; line-height: 1;
  transition: color 0.2s; font-family: var(--font-sans);
}
.btn-back:hover { color: var(--ink); }

/* ===== TOP BAR ===== */
.top-bar {
  display: flex; align-items: center; width: 100%;
  padding: 16px 0 8px; margin-bottom: 4px;
}
.top-title {
  flex: 1; text-align: center;
  font-family: var(--font-serif); font-weight: 600;
  font-size: 16px; letter-spacing: 3px; color: var(--ink-80);
}
.top-spacer { width: 42px; }

/* ===== POEM CARD ===== */
.poem-card {
  width: 100%; background: #fff;
  border-radius: var(--radius); padding: 28px 20px;
  box-shadow: var(--shadow-md); margin-bottom: 28px;
  position: relative;
}
.poem-card::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px;
  height: 2px; border-radius: 1px;
  background: linear-gradient(90deg, var(--red), var(--gold), var(--green));
}
.poem-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
}
.poem-badge {
  font-family: var(--font-sans); font-size: 11px; font-weight: 500;
  color: var(--green); background: var(--green-bg);
  padding: 3px 10px; border-radius: 10px; letter-spacing: 1px;
}
.poem-dynasty {
  font-family: var(--font-serif); font-size: 12px;
  color: var(--ink-40); letter-spacing: 1px;
}

.poem-lines { margin-bottom: 20px; }
.poem-line-wrap {
  display: flex; justify-content: center; gap: 0;
  margin-bottom: 18px;
}
.poem-line-wrap:last-child { margin-bottom: 0; }
.ch {
  display: flex; flex-direction: column; align-items: center;
  width: 42px; cursor: default;
}
.ch-py {
  font-family: var(--font-sans); font-size: 11px; font-weight: 400;
  color: var(--red); line-height: 1.2;
  margin-bottom: 5px; min-height: 14px;
  white-space: nowrap;
}
.ch-char {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 22px; color: var(--ink); line-height: 1.3;
}
.ch-punct {
  font-family: var(--font-serif); font-size: 22px;
  color: var(--ink-40); width: 12px; text-align: center;
  align-self: flex-end; padding-bottom: 2px;
}

.demo-avatar-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.demo-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 2px solid #fff; box-shadow: var(--shadow-sm);
}
.demo-avatar-text {
  font-family: var(--font-sans); font-size: 13px;
  color: var(--ink-60); line-height: 1.6;
}
.demo-avatar-name {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 14px; color: var(--ink);
}

.btn-listen {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px; border: 1.5px solid var(--ink-10);
  border-radius: var(--radius-sm); background: none;
  font-family: var(--font-sans); font-size: 13px;
  color: var(--ink-60); cursor: pointer; transition: all 0.2s;
  letter-spacing: 1px;
}
.btn-listen:hover { border-color: var(--green); color: var(--green); }
.btn-listen.playing { border-color: var(--green); color: var(--green); background: var(--green-bg); }

/* ===== RECORD PAGE ===== */
.record-target {
  width: 100%; background: #fff;
  border-radius: var(--radius); padding: 24px 20px;
  box-shadow: var(--shadow-md); margin-bottom: 28px; text-align: center;
}
.record-label {
  font-family: var(--font-sans); font-size: 12px;
  color: var(--ink-40); letter-spacing: 2px; margin-bottom: 16px;
}
.record-line-row .ch-char { font-size: 24px; }
.record-line-row .ch { width: 42px; }
.record-line-row .ch-py { font-size: 11px; }
.record-line-row.active .ch-char { font-size: 28px; }
.record-line-row.active .ch { width: 48px; }
.record-line-row.active .ch-py { font-size: 12px; }

.record-area {
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; flex: 1; justify-content: center; padding-bottom: 48px;
}
#waveform { opacity: 0.3; transition: opacity 0.3s; }
#waveform.active { opacity: 1; }

.mic-btn {
  width: 76px; height: 76px; border-radius: 50%;
  background: var(--red); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: all 0.3s ease;
  box-shadow: 0 4px 24px rgba(183,62,58,0.3);
  position: relative;
}
.mic-btn:hover { transform: scale(1.05); }
.mic-btn.recording { background: var(--ink-80); animation: mic-pulse 1.5s ease infinite; }
.mic-btn.recording::before {
  content: ''; position: absolute; inset: -8px;
  border-radius: 50%; border: 2px solid var(--red);
  animation: mic-ring 1.5s ease infinite;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 4px 24px rgba(183,62,58,0.3); }
  50% { box-shadow: 0 4px 36px rgba(183,62,58,0.5); }
}
@keyframes mic-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.5); opacity: 0; }
}
.mic-hint {
  font-family: var(--font-sans); font-size: 12px;
  color: var(--ink-40); letter-spacing: 2px;
}

/* ===== REPORT ===== */
.report-content { width: 100%; }
.score-ring-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin: 12px 0 24px;
}
.score-ring { position: relative; width: 140px; height: 140px; }
.score-ring canvas { width: 140px; height: 140px; }
.score-ring-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-num {
  font-family: var(--font-num); font-weight: 700;
  font-size: 44px; color: var(--ink); line-height: 1;
}
.score-grade {
  font-family: var(--font-serif); font-size: 15px;
  margin-top: 4px; letter-spacing: 3px;
}

.dim-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 24px;
}
.dim-card {
  background: #fff; border-radius: var(--radius-sm);
  padding: 16px 8px; text-align: center;
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.dim-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.dim-card.phone::before { background: var(--green); }
.dim-card.tone::before { background: var(--red); }
.dim-card.fluency::before { background: var(--gold); }
.dim-label {
  font-family: var(--font-sans); font-size: 11px;
  color: var(--ink-40); letter-spacing: 1px; margin-bottom: 6px;
}
.dim-score {
  font-family: var(--font-num); font-weight: 600; font-size: 28px; color: var(--ink);
}

.section-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 14px; color: var(--ink-80); letter-spacing: 2px;
  margin-bottom: 10px; padding-left: 2px;
}

.word-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-bottom: 24px;
}
.word-cell {
  background: #fff; border-radius: var(--radius-sm);
  padding: 10px 2px; text-align: center;
  box-shadow: var(--shadow-sm);
  border-bottom: 2.5px solid transparent;
}
.word-cell.ok { border-bottom-color: var(--green); }
.word-cell.warn { border-bottom-color: var(--gold); }
.word-cell.error { border-bottom-color: var(--red); }
.word-cell .wc-char {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 18px; color: var(--ink); margin-bottom: 3px;
}
.word-cell .wc-score { font-family: var(--font-num); font-weight: 600; font-size: 14px; }
.word-cell.ok .wc-score { color: var(--green); }
.word-cell.warn .wc-score { color: var(--gold); }
.word-cell.error .wc-score { color: var(--red); }
.word-cell .wc-py {
  font-family: var(--font-sans); font-size: 9px;
  color: var(--ink-40); margin-top: 2px;
}

.suggestions {
  background: var(--red-bg); border-radius: var(--radius-sm);
  padding: 16px 18px; margin-bottom: 24px;
}
.suggestions li {
  font-family: var(--font-sans); font-size: 13px;
  color: var(--ink-80); line-height: 1.9;
  list-style: none; padding-left: 14px; position: relative;
}
.suggestions li::before {
  content: ''; position: absolute; left: 0; top: 10px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
}

.report-actions {
  display: flex; gap: 12px; justify-content: center;
  padding: 4px 0 16px; width: 100%;
}

/* ===== TEACHER DASHBOARD ===== */
.teacher-content { width: 100%; }
.teacher-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
}
.teacher-class {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 18px; color: var(--ink); letter-spacing: 2px;
}
.teacher-sub {
  font-family: var(--font-sans); font-size: 11px;
  color: var(--ink-40); letter-spacing: 1px;
}

.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.stat-card {
  background: #fff; border-radius: var(--radius-sm);
  padding: 16px 10px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-value {
  font-family: var(--font-num); font-weight: 700;
  font-size: 26px; color: var(--ink); margin-bottom: 3px;
}
.stat-label {
  font-family: var(--font-sans); font-size: 11px;
  color: var(--ink-40); letter-spacing: 1px;
}
.stat-card.highlight .stat-value { color: var(--green); }

.chart-card {
  background: #fff; border-radius: var(--radius);
  padding: 20px 10px; box-shadow: var(--shadow-sm); margin-bottom: 20px;
}
.chart-card canvas { width: 100%; height: 160px; display: block; }

.error-chars {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.error-char-card {
  background: #fff; border-radius: var(--radius-sm);
  padding: 12px; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.ec-char {
  font-family: var(--font-serif); font-weight: 700;
  font-size: 26px; color: var(--red); width: 36px; text-align: center;
}
.ec-info { flex: 1; }
.ec-type { font-family: var(--font-sans); font-size: 11px; color: var(--ink-40); }
.ec-rate { font-family: var(--font-num); font-weight: 600; font-size: 13px; color: var(--ink-80); }

.student-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
.student-card {
  background: #fff; border-radius: var(--radius-sm);
  padding: 12px; display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.student-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-weight: 600;
  font-size: 13px; color: #fff; flex-shrink: 0;
}
.student-info { flex: 1; min-width: 0; }
.student-name {
  font-family: var(--font-sans); font-size: 13px;
  font-weight: 500; color: var(--ink);
}
.student-score { font-family: var(--font-num); font-weight: 600; font-size: 13px; }
.student-grade-tag {
  font-family: var(--font-sans); font-size: 10px;
  padding: 1px 6px; border-radius: 8px; letter-spacing: 1px; margin-left: 4px;
}
.grade-excellent { background: rgba(47,93,79,0.1); color: var(--green); }
.grade-good { background: rgba(184,146,63,0.1); color: var(--gold); }
.grade-pass { background: rgba(26,22,18,0.06); color: var(--ink-60); }
.grade-fail { background: rgba(183,62,58,0.08); color: var(--red); }

/* ===== LOADING ===== */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(245,240,230,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }
.loading-dots { display: flex; gap: 8px; margin-bottom: 16px; }
.loading-dots span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); animation: dot-bounce 1.2s ease infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}
.loading-text {
  font-family: var(--font-sans); font-size: 13px;
  color: var(--ink-60); letter-spacing: 2px;
}
.gpt-report {
  background: #fff; border-radius: var(--radius-sm);
  padding: 18px 16px; box-shadow: var(--shadow-sm);
  font-family: var(--font-sans); font-size: 13px;
  color: var(--ink-80); line-height: 2; margin-bottom: 24px;
  border-left: 3px solid var(--green);
}

/* Line progress dots */
.line-progress {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; margin-bottom: 16px;
}
.line-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--ink-10); transition: all 0.3s;
}
.line-dot.done { background: var(--green); }
.line-dot.current { background: var(--red); animation: dot-pulse 1.2s ease infinite; }
@keyframes dot-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(183,62,58,0.3); }
  50% { transform: scale(1.3); box-shadow: 0 0 0 6px rgba(183,62,58,0); }
}
.line-progress-text {
  font-family: var(--font-sans); font-size: 12px;
  color: var(--ink-40); letter-spacing: 1px;
}

/* Record line states */
.record-lines-wrap { width: 100%; }
.record-line-row {
  display: flex; justify-content: center; gap: 0;
  margin-bottom: 10px; transition: all 0.3s;
}
.record-line-row.inactive { opacity: 0.25; transform: scale(0.92); }
.record-line-row.active { opacity: 1; transform: scale(1); }
.record-line-row.completed { opacity: 0.5; }
.record-line-row.completed .ch-char { color: var(--green); }

.line-check {
  display: none; font-size: 20px; color: var(--green);
  margin-left: 4px; align-self: center;
}
.record-line-row.completed .line-check { display: inline; }

/* GPT report button */
.btn-gpt {
  font-family: var(--font-sans); font-weight: 500;
  font-size: 14px; letter-spacing: 2px;
  color: #fff; background: linear-gradient(135deg, var(--green), var(--green-light));
  border: none; border-radius: 28px;
  padding: 14px 32px; cursor: pointer;
  transition: all 0.3s ease; width: 100%;
  box-shadow: 0 3px 16px rgba(47,93,79,0.25);
  margin-bottom: 16px;
}
.btn-gpt:hover { transform: translateY(-1px); box-shadow: 0 5px 24px rgba(47,93,79,0.3); }
.btn-gpt:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.gpt-loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; padding: 20px 16px; color: var(--ink-60);
  font-family: var(--font-sans); font-size: 13px; letter-spacing: 1px;
}
.gpt-loading .spinner {
  width: 16px; height: 16px; border: 2px solid var(--ink-10);
  border-top-color: var(--green); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.gpt-progress-wrap {
  width: 100%; background: var(--ink-10); border-radius: 6px;
  height: 6px; overflow: hidden;
}
.gpt-progress-bar {
  height: 100%; border-radius: 6px; width: 0%;
  background: linear-gradient(90deg, var(--green), var(--green-light));
  transition: width 0.3s ease;
}
.gpt-progress-text {
  font-family: var(--font-sans); font-size: 12px;

<script>
const POEM = [
  {chars:[{c:'月',p:'yuè'},{c:'落',p:'luò'},{c:'烏',p:'wū'},{c:'啼',p:'tí'},{c:'霜',p:'shuāng'},{c:'滿',p:'mǎn'},{c:'天',p:'tiān'}], punct:'，'},
  {chars:[{c:'江',p:'jiāng'},{c:'楓',p:'fēng'},{c:'漁',p:'yú'},{c:'火',p:'huǒ'},{c:'對',p:'duì'},{c:'愁',p:'chóu'},{c:'眠',p:'mián'}], punct:'。'},
  {chars:[{c:'姑',p:'gū'},{c:'蘇',p:'sū'},{c:'城',p:'chéng'},{c:'外',p:'wài'},{c:'寒',p:'hán'},{c:'山',p:'shān'},{c:'寺',p:'sì'}], punct:'，'},
  {chars:[{c:'夜',p:'yè'},{c:'半',p:'bàn'},{c:'鐘',p:'zhōng'},{c:'聲',p:'shēng'},{c:'到',p:'dào'},{c:'客',p:'kè'},{c:'船',p:'chuán'}], punct:'。'}

const MOCK_RESULT = {
  total_score: 82, grade: '良',
  dimensions: { phone_score: 85, tone_score: 76, fluency_score: 88, integrity_score: 100 },
  words: [
    {c:'月',p:'yuè',score:92,status:'ok'},
    {c:'落',p:'luò',score:88,status:'ok'},
    {c:'烏',p:'wū',score:61,status:'warn',error:'聲母偏誤'},
    {c:'啼',p:'tí',score:85,status:'ok'},
    {c:'霜',p:'shuāng',score:55,status:'error',error:'聲調偏誤'},
    {c:'滿',p:'mǎn',score:78,status:'warn',error:'聲調偏誤'},
    {c:'天',p:'tiān',score:95,status:'ok'}
  ],
  suggestions: [
    '「烏」聲母 w 發音需更圓潤，舌位略後',
    '「霜」聲調應為陰平（一聲），保持高平調',
    '「滿」聲調應為上聲（三聲），注意先降後升'
  ]
};

const TEACHER_DATA = {
  className: '4A班', total: 32, avg: 78.5, passRate: 85, excellentRate: 32,
  distribution: [{range:'60-69',count:5},{range:'70-79',count:10},{range:'80-89',count:12},{range:'90-100',count:5}],
  errorChars: [
    {c:'霜',type:'聲調偏誤',rate:'62%'},{c:'啼',type:'韻母偏誤',rate:'41%'},
    {c:'烏',type:'聲母偏誤',rate:'38%'},{c:'滿',type:'聲調偏誤',rate:'35%'}
  ],
  students: [
    {name:'陳思琪',score:95,grade:'優'},{name:'林浩然',score:88,grade:'良'},
    {name:'王子萱',score:82,grade:'良'},{name:'張銘軒',score:79,grade:'良'},
    {name:'李欣怡',score:74,grade:'中'},{name:'黃俊傑',score:71,grade:'中'},
    {name:'劉雨桐',score:65,grade:'中'},{name:'吳嘉欣',score:58,grade:'差'}
  ]
};

function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'pg-teacher') setTimeout(drawDistChart, 300);
  if (id === 'pg-record') resetRecording();
}

function renderPoem() {
  const el = document.getElementById('poem-lines');
  el.innerHTML = POEM.map(line => {
    const chars = line.chars.map(ch =>
      `<div class="ch"><span class="ch-py">${ch.p}</span><span class="ch-char">${ch.c}</span></div>`
    ).join('');
    return `<div class="poem-line-wrap">${chars}<span class="ch-punct">${line.punct}</span></div>`;
  }).join('');
  renderRecordPage();
}

function playDemo() {
  const btn = document.querySelector('.btn-listen');
  if (btn.classList.contains('playing')) return;
  const text = POEM.map(l => l.chars.map(c => c.c).join('')).join('，');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.8; u.pitch = 1;
  u.onstart = () => btn.classList.add('playing');
  u.onend = () => btn.classList.remove('playing');
  u.onerror = () => btn.classList.remove('playing');
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

let mediaRec = null, audioChunks = [], isRecording = false, analyser = null, animFrame = null, recAudioCtx = null;

const LINES = [
  { ref: '月落乌啼霜满天', chars: POEM[0].chars, punct: '，' },
  { ref: '江枫渔火对愁眠', chars: POEM[1].chars, punct: '。' },
  { ref: '姑苏城外寒山寺', chars: POEM[2].chars, punct: '，' },
  { ref: '夜半钟声到客船', chars: POEM[3].chars, punct: '。' }
];
let currentLine = 0;
let lineResults = [null, null, null, null];
let mergedResult = null;

const PINYIN_MAP = {'月':'yuè','落':'luò','乌':'wū','啼':'tí','霜':'shuāng','满':'mǎn','天':'tiān','江':'jiāng','枫':'fēng','渔':'yú','火':'huǒ','对':'duì','愁':'chóu','眠':'mián','姑':'gū','苏':'sū','城':'chéng','外':'wài','寒':'hán','山':'shān','寺':'sì','夜':'yè','半':'bàn','钟':'zhōng','声':'shēng','到':'dào','客':'kè','船':'chuán'};
const TRAD_MAP = {'月':'月','落':'落','乌':'烏','啼':'啼','霜':'霜','满':'滿','天':'天','江':'江','枫':'楓','渔':'漁','火':'火','对':'對','愁':'愁','眠':'眠','姑':'姑','苏':'蘇','城':'城','外':'外','寒':'寒','山':'山','寺':'寺','夜':'夜','半':'半','钟':'鐘','声':'聲','到':'到','客':'客','船':'船'};

function renderRecordPage() {
  const prog = document.getElementById('line-progress');
  prog.innerHTML = LINES.map((_, i) => {
    const cls = i < currentLine ? 'done' : i === currentLine ? 'current' : '';
    return `<span class="line-dot ${cls}"></span>`;
  }).join('') + `<span class="line-progress-text">${currentLine < 4 ? (currentLine + 1) + '/4' : '完成'}</span>`;

  document.getElementById('record-label').textContent =
    currentLine < 4 ? `第 ${currentLine + 1}/4 句` : '全部完成！';

  const wrap = document.getElementById('record-lines');
  wrap.innerHTML = LINES.map((line, i) => {
    const state = i < currentLine ? 'completed' : i === currentLine ? 'active' : 'inactive';
    const chars = line.chars.map(ch =>
      `<div class="ch"><span class="ch-py">${ch.p}</span><span class="ch-char">${ch.c}</span></div>`
    ).join('');
    return `<div class="record-line-row ${state}">${chars}<span class="ch-punct">${line.punct}</span><span class="line-check">✓</span></div>`;
  }).join('');
}

function resetRecording() {
  currentLine = 0;
  lineResults = [null, null, null, null];
  mergedResult = null;
  renderRecordPage();
}

function toggleRecord() {
  if (currentLine >= 4) return;
  isRecording ? stopRecord() : startRecord();
}

async function startRecord() {
  speechSynthesis.cancel();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = recAudioCtx.createMediaStreamSource(stream);
    analyser = recAudioCtx.createAnalyser(); analyser.fftSize = 256;
    src.connect(analyser);
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/mp4';
    mediaRec = new MediaRecorder(stream, { mimeType: mime });
    audioChunks = [];
    mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.onstop = () => { stream.getTracks().forEach(t => t.stop()); onRecordDone(); };
    mediaRec.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-hint').textContent = '錄音中，再次點擊結束';
    document.getElementById('waveform').classList.add('active');
    drawWaveform();
  } catch (e) {
    alert('無法存取麥克風，請檢查瀏覽器權限設定');
  }
}

function stopRecord() {
  if (mediaRec && mediaRec.state === 'recording') mediaRec.stop();
  isRecording = false; cancelAnimationFrame(animFrame);
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-hint').textContent = '處理中…';
  document.getElementById('waveform').classList.remove('active');
}

function drawWaveform() {
  const canvas = document.getElementById('waveform');
  const c = canvas.getContext('2d'), W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  (function draw() {
    animFrame = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    c.clearRect(0, 0, W, H);
    c.beginPath(); c.strokeStyle = '#2f5d4f'; c.lineWidth = 2;
    const step = W / buf.length;
    for (let i = 0; i < buf.length; i++) {
      const y = (buf[i] / 255) * H;
      i === 0 ? c.moveTo(0, y) : c.lineTo(i * step, y);
    }
    c.stroke();
  })();
}

async function blobToWavBase64(blob) {
  const arrayBuf = await blob.arrayBuffer();
  const decoded = await recAudioCtx.decodeAudioData(arrayBuf);
  const TARGET_SR = 16000;
  const offline = new OfflineAudioContext(1, Math.ceil(decoded.duration * TARGET_SR), TARGET_SR);
  const bufSrc = offline.createBufferSource();
  bufSrc.buffer = decoded;
  bufSrc.connect(offline.destination);
  bufSrc.start(0);
  const rendered = await offline.startRendering();
  const pcm = rendered.getChannelData(0);
  const pcm16 = new Int16Array(pcm.length);
  for (let i = 0; i < pcm.length; i++) {
    const s = Math.max(-1, Math.min(1, pcm[i]));
    pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  const wavBuf = new ArrayBuffer(44 + pcm16.length * 2);
  const view = new DataView(wavBuf);
  const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + pcm16.length * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, TARGET_SR, true);
  view.setUint32(28, TARGET_SR * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, pcm16.length * 2, true);
  const wavBytes = new Uint8Array(wavBuf);
  const pcmBytes = new Uint8Array(pcm16.buffer);
  wavBytes.set(pcmBytes, 44);
  let binary = '';
  for (let i = 0; i < wavBytes.length; i++) binary += String.fromCharCode(wavBytes[i]);
  return btoa(binary);
}

function mapTencentResult(resp) {
  const total = Math.round(resp.SuggestedScore || resp.PronAccuracy || 0);
  const grade = total >= 90 ? '優' : total >= 75 ? '良' : total >= 60 ? '中' : '差';
  const fluency = Math.round((resp.PronFluency || 0) * 100);
  const completion = Math.round((resp.PronCompletion || 0) * 100);
  const words = (resp.Words || []).filter(w => {
    const ch = w.Word || '';
    return /[一-鿿]/.test(ch);
  }).map(w => {
    const ch = w.Word || '';
    const sc = Math.round(w.PronAccuracy || 0);
    const trad = TRAD_MAP[ch] || ch;
    const py = PINYIN_MAP[ch] || '';
    let status = 'ok', error = '';
    if (sc < 60) { status = 'error'; error = '發音偏誤'; }
    else if (sc < 80) { status = 'warn'; error = '發音待改進'; }
    if (w.PhoneInfos && w.PhoneInfos.length > 0) {
      const worst = w.PhoneInfos.reduce((a, b) => (a.PronAccuracy < b.PronAccuracy ? a : b));
      if (worst.PronAccuracy < 60) error = '聲韻偏誤';
    }
    return { c: trad, p: py, score: Math.max(0, sc), status, error };
  });
  const suggestions = words.filter(w => w.status !== 'ok').map(w =>
    `「${w.c}」${w.error}，得分 ${w.score}，需加強練習`
  );
  return {
    total_score: total, grade,
    dimensions: {
      phone_score: Math.round(resp.PronAccuracy || total),
      tone_score: Math.round(resp.PronAccuracy ? resp.PronAccuracy * 0.9 : total * 0.9),
      fluency_score: fluency || total,
      integrity_score: completion || 100
    },
    words: words.length > 0 ? words : MOCK_RESULT.words,
    suggestions: suggestions.length > 0 ? suggestions : ['發音整體良好，繼續保持']
  };
}

async function onRecordDone() {
  if (currentLine >= 4) return;
  document.getElementById('loading').classList.add('show');
  document.querySelector('.loading-text').textContent = `第 ${currentLine + 1} 句評測中`;
  try {
    const blob = new Blob(audioChunks, { type: mediaRec.mimeType });
    const wavB64 = await blobToWavBase64(blob);
    if (recAudioCtx && recAudioCtx.state !== 'closed') recAudioCtx.close();
    const resp = await fetch('/api/soe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ audio: wavB64, refText: LINES[currentLine].ref })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    lineResults[currentLine] = mapTencentResult(data);
  } catch (e) {
    console.warn(`第 ${currentLine + 1} 句 API 失敗:`, e.message);
    lineResults[currentLine] = makeMockLine(currentLine);
  }
  document.getElementById('loading').classList.remove('show');
  currentLine++;
  renderRecordPage();

  if (currentLine >= 4) {
    mergedResult = mergeLineResults(lineResults);
    setTimeout(() => {
      renderReport(mergedResult);
      goPage('pg-report');
    }, 800);
  } else {
    document.getElementById('mic-hint').textContent = `第 ${currentLine + 1} 句，點擊麥克風錄音`;
  }
}

function makeMockLine(idx) {
  const line = LINES[idx];
  return {
    total_score: MOCK_RESULT.total_score,
    grade: MOCK_RESULT.grade,
    dimensions: { ...MOCK_RESULT.dimensions },
    words: line.chars.map(ch => {
      const mock = MOCK_RESULT.words.find(w => w.c === ch.c);
      return mock || { c: ch.c, p: ch.p, score: 80, status: 'ok', error: '' };
    }),
    suggestions: []
  };
}

function mergeLineResults(results) {
  const allWords = results.flatMap(r => r.words);
  const dims = { phone_score: 0, tone_score: 0, fluency_score: 0, integrity_score: 0 };
  let totalScore = 0;
  results.forEach(r => {
    totalScore += r.total_score;
    dims.phone_score += r.dimensions.phone_score;
    dims.tone_score += r.dimensions.tone_score;
    dims.fluency_score += r.dimensions.fluency_score;
    dims.integrity_score += r.dimensions.integrity_score;
  });
  const n = results.length;
  totalScore = Math.round(totalScore / n);
  dims.phone_score = Math.round(dims.phone_score / n);
  dims.tone_score = Math.round(dims.tone_score / n);
  dims.fluency_score = Math.round(dims.fluency_score / n);
  dims.integrity_score = Math.round(dims.integrity_score / n);
  const grade = totalScore >= 90 ? '優' : totalScore >= 75 ? '良' : totalScore >= 60 ? '中' : '差';
  const suggestions = allWords.filter(w => w.status !== 'ok').map(w =>
    `「${w.c}」${w.error}，得分 ${w.score}，需加強練習`
  );
  return {
    total_score: totalScore, grade, dimensions: dims,
    words: allWords,
    suggestions: suggestions.length > 0 ? suggestions : ['發音整體良好，繼續保持']
  };
}

function renderReport(r) {
  const el = document.getElementById('report-content');
  const gc = r.total_score >= 90 ? 'var(--green)' : r.total_score >= 70 ? 'var(--gold)' : 'var(--red)';
  const wordGroups = [];
  for (let i = 0; i < r.words.length; i += 7) {
    wordGroups.push(r.words.slice(i, i + 7));
  }
  el.innerHTML = `
    <div class="score-ring-wrap">
      <div class="score-ring">
        <canvas id="ring-canvas" width="280" height="280"></canvas>
        <div class="score-ring-inner">
          <span class="score-num">${r.total_score}</span>
          <span class="score-grade" style="color:${gc}">${r.grade}</span>
        </div>
      </div>
    </div>
    <div class="dim-cards">
      <div class="dim-card phone"><p class="dim-label">聲韻</p><p class="dim-score">${r.dimensions.phone_score}</p></div>
      <div class="dim-card tone"><p class="dim-label">聲調</p><p class="dim-score">${r.dimensions.tone_score}</p></div>
      <div class="dim-card fluency"><p class="dim-label">流暢度</p><p class="dim-score">${r.dimensions.fluency_score}</p></div>
    </div>
    <p class="section-title">逐字分析</p>
    ${wordGroups.map(group => `
      <div class="word-line-group">
        <div class="word-grid">${group.map(w => `
          <div class="word-cell ${w.status}">
            <div class="wc-char">${w.c}</div>
            <div class="wc-score">${w.score}</div>
            <div class="wc-py">${w.p}</div>
          </div>`).join('')}
        </div>
      </div>`).join('')}
    <p class="section-title">糾正建議</p>
    <ul class="suggestions">${r.suggestions.map(s => `<li>${s}</li>`).join('')}</ul>
    <button class="btn-gpt" id="btn-gpt" onclick="generateGptReport()">生成 AI 診斷報告</button>
    <div id="gpt-area"></div>`;
  drawRing(r.total_score, gc);
}

async function generateGptReport() {
  const btn = document.getElementById('btn-gpt');
  const area = document.getElementById('gpt-area');
  btn.disabled = true;
  btn.textContent = '報告生成中…';
  area.innerHTML = `<div class="gpt-loading">
    <div class="gpt-progress-wrap"><div class="gpt-progress-bar" id="gpt-bar"></div></div>
    <p class="gpt-progress-text" id="gpt-stage">正在分析發音數據…</p>
  </div>`;

  const bar = document.getElementById('gpt-bar');
  const stage = document.getElementById('gpt-stage');
  const stages = [
    { pct: 15, text: '正在分析發音數據…', delay: 400 },
    { pct: 35, text: '比對聲韻聲調標準…', delay: 1200 },
    { pct: 55, text: 'AI 老師撰寫診斷中…', delay: 2500 },
    { pct: 75, text: '生成練習建議…', delay: 4500 },
    { pct: 88, text: '即將完成…', delay: 6500 }
  ];
  const timers = stages.map(s => setTimeout(() => {
    bar.style.width = s.pct + '%';
    stage.textContent = s.text;
  }, s.delay));

  try {
    const resp = await fetch('/api/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ soeResult: mergedResult, poem: '楓橋夜泊' })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    const report = data.report || '';
    if (!report) throw new Error('Empty report');
    timers.forEach(clearTimeout);
    bar.style.width = '100%';
    stage.textContent = '報告生成完成！';
    await new Promise(r => setTimeout(r, 500));
    btn.style.display = 'none';
    area.innerHTML = `
      <p class="section-title" style="margin-top:8px">AI 老師診斷</p>
      <div class="gpt-report">${report.replace(/\n/g, '<br>')}</div>`;
  } catch (e) {
    timers.forEach(clearTimeout);
    console.warn('GPT 報告生成失敗:', e.message);
    btn.disabled = false;
    btn.textContent = '重試生成報告';
    area.innerHTML = '<p style="text-align:center;color:var(--red);font-size:13px;padding:8px 0">報告生成失敗，請重試</p>';
  }
}

function drawRing(score, color) {
  const canvas = document.getElementById('ring-canvas');
  if (!canvas) return;
  const c = canvas.getContext('2d');
  const cx = 140, cy = 140, r = 120, lw = 10;
  c.clearRect(0, 0, 280, 280);
  c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2);
  c.strokeStyle = '#e8e3da'; c.lineWidth = lw; c.lineCap = 'round'; c.stroke();
  const angle = (score / 100) * Math.PI * 2 - Math.PI / 2;
  c.beginPath(); c.arc(cx, cy, r, -Math.PI / 2, angle);
  c.strokeStyle = color; c.lineWidth = lw; c.lineCap = 'round'; c.stroke();
}

function renderTeacher() {
  const d = TEACHER_DATA, el = document.getElementById('teacher-content');
  const bgColors = ['#2f5d4f','#b8923f','#6b6259','#b73e3a'];
  const scoreColors = {'優':'var(--green)','良':'var(--gold)','中':'var(--ink-60)','差':'var(--red)'};
  el.innerHTML = `
    <div class="teacher-header">
      <span class="teacher-class">${d.className}</span>
      <span class="teacher-sub">${d.total} 位學生 · 楓橋夜泊</span>
    </div>
    <div class="stats-row">
      <div class="stat-card highlight"><p class="stat-value">${d.avg}</p><p class="stat-label">班均分</p></div>
      <div class="stat-card"><p class="stat-value">${d.passRate}%</p><p class="stat-label">合格率</p></div>
      <div class="stat-card"><p class="stat-value">${d.excellentRate}%</p><p class="stat-label">優秀率</p></div>
    </div>
    <p class="section-title">成績分佈</p>
    <div class="chart-card"><canvas id="dist-chart"></canvas></div>
    <p class="section-title">高頻錯字 Top 4</p>
    <div class="error-chars">
      ${d.errorChars.map(ec => `
        <div class="error-char-card">
          <span class="ec-char">${ec.c}</span>
          <div class="ec-info"><p class="ec-type">${ec.type}</p><p class="ec-rate">錯誤率 ${ec.rate}</p></div>
        </div>`).join('')}
    </div>
    <p class="section-title">學生成績</p>
    <div class="student-grid">
      ${d.students.map((s, i) => {
        const gc = s.grade === '優' ? 'excellent' : s.grade === '良' ? 'good' : s.grade === '中' ? 'pass' : 'fail';
        return `
        <div class="student-card">
          <div class="student-avatar" style="background:${bgColors[i % 4]}">${s.name[0]}</div>
          <div class="student-info">
            <p class="student-name">${s.name}</p>
            <p><span class="student-score" style="color:${scoreColors[s.grade]}">${s.score}</span>
            <span class="student-grade-tag grade-${gc}">${s.grade}</span></p>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function drawDistChart() {
  const canvas = document.getElementById('dist-chart');
  if (!canvas) return;
  const parent = canvas.parentElement;
  const W = parent.clientWidth - 20 || 360;
  const H = 160;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const c = canvas.getContext('2d');
  c.scale(dpr, dpr);
  const data = TEACHER_DATA.distribution;
  const maxCount = Math.max(...data.map(d => d.count));
  const barW = W * 0.13, gap = W * 0.07;
  const totalW = data.length * barW + (data.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const rawColors = ['#9e9488','#b8923f','#2f5d4f','#2f5d4f'];
  c.clearRect(0, 0, W, H);
  c.strokeStyle = '#e2ddd5'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(startX - 10, H - 30); c.lineTo(startX + totalW + 10, H - 30); c.stroke();
  data.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    const barH = (d.count / maxCount) * (H - 60);
    const y = H - 30 - barH, rad = 4;
    c.fillStyle = rawColors[i];
    c.beginPath();
    c.moveTo(x + rad, y); c.lineTo(x + barW - rad, y);
    c.quadraticCurveTo(x + barW, y, x + barW, y + rad);
    c.lineTo(x + barW, H - 30); c.lineTo(x, H - 30);
    c.lineTo(x, y + rad); c.quadraticCurveTo(x, y, x + rad, y);
    c.fill();
    c.fillStyle = '#1a1612'; c.font = '600 13px Inter'; c.textAlign = 'center';
    c.fillText(d.count, x + barW / 2, y - 6);
    c.fillStyle = '#9e9488'; c.font = '11px "Noto Sans TC"';
    c.fillText(d.range, x + barW / 2, H - 12);
  });
}

renderPoem();
renderTeacher();
</script>
