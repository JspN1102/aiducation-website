<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Test</title>
<script type="importmap">
{
  "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/"
  }
}
</script>
</head>
<body style="margin:0;background:#000;color:#fff;font-family:sans-serif;">
<div id="status" style="padding:20px;">Loading Three.js...</div>
<div id="container" style="width:100vw;height:100vh;"></div>
<script type="module">
const status = document.getElementById('status');
try {
  status.textContent = 'Step 1: importing three...';
  const THREE = await import('three');
  status.textContent = 'Step 2: three loaded! Version: ' + THREE.REVISION;

  status.textContent += ' | importing OrbitControls...';
  const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
  status.textContent += ' OK';

  status.textContent += ' | importing CSS2DRenderer...';
  const { CSS2DRenderer } = await import('three/addons/renderers/CSS2DRenderer.js');
  status.textContent += ' OK';

  status.textContent += ' | importing EffectComposer...';
  const { EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js');
  status.textContent += ' OK';

  status.textContent += ' | importing RenderPass...';
  const { RenderPass } = await import('three/addons/postprocessing/RenderPass.js');
  status.textContent += ' OK';

  status.textContent += ' | importing UnrealBloomPass...';
  const { UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js');
  status.textContent += ' OK';

  status.textContent = 'All imports OK! Creating scene...';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1408);
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 3, 14);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x1a1408);
  document.getElementById('container').appendChild(renderer.domElement);

  // Simple moon
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(2.5, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xfff4d6 })
  );
  moon.position.set(0, 3, 0);
  scene.add(moon);
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  renderer.render(scene, camera);
  status.textContent = 'SUCCESS - Scene rendered!';
  status.style.color = '#4ade80';

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    moon.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  animate();

} catch(e) {
  status.textContent = 'ERROR: ' + e.message;
  status.style.color = '#f87171';
  console.error(e);
}
</script>
</body>
</html>
